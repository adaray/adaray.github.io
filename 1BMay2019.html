<script>

    // Get free keys from https://www.emailjs.com/
    const EMAILJS_PUBLIC_KEY = "PmVcThAzwAjgqOwSD";     // Replace with your EmailJS public key
    const EMAILJS_SERVICE_ID = "service_301bogs";   // Replace with your service ID
    const EMAILJS_TEMPLATE_ID = "template_mld7q9t"; // Replace with your template ID
    const RECIPIENT_EMAIL = "ibn.daray@gmail.com";
    
    // Initialize EmailJS if keys are provided
    if(EMAILJS_PUBLIC_KEY !== "YOUR_PUBLIC_KEY") {
        emailjs.init(EMAILJS_PUBLIC_KEY);
    }
    
    // ========== IndexedDB Setup ==========
    const DB_NAME = "IGCSE_Biology_Exam_DB";
    const DB_VERSION = 2;
    const PROGRESS_STORE = "exam_progress";
    const RESULTS_STORE = "exam_results";
    let db = null;
    
    function initDatabase() {
        return new Promise((resolve, reject) => {
            const request = indexedDB.open(DB_NAME, DB_VERSION);
            request.onerror = () => reject(request.error);
            request.onsuccess = () => {
                db = request.result;
                resolve(db);
            };
            request.onupgradeneeded = (event) => {
                const dbEvent = event.target.result;
                if (!dbEvent.objectStoreNames.contains(PROGRESS_STORE)) {
                    dbEvent.createObjectStore(PROGRESS_STORE, { keyPath: "id" });
                }
                if (!dbEvent.objectStoreNames.contains(RESULTS_STORE)) {
                    dbEvent.createObjectStore(RESULTS_STORE, { keyPath: "id", autoIncrement: true });
                }
            };
        });
    }
    
    async function saveProgressToDB(answers, manualMarks, timeLeft) {
        if (!db) await initDatabase();
        return new Promise((resolve, reject) => {
            const transaction = db.transaction([PROGRESS_STORE], "readwrite");
            const store = transaction.objectStore(PROGRESS_STORE);
            const record = {
                id: "current_progress",
                answers: answers,
                manualMarks: manualMarks,
                timeRemaining: timeLeft,
                timestamp: new Date().toISOString()
            };
            const request = store.put(record);
            request.onsuccess = () => resolve();
            request.onerror = () => reject(request.error);
        });
    }
    
    async function loadProgressFromDB() {
        if (!db) await initDatabase();
        return new Promise((resolve, reject) => {
            const transaction = db.transaction([PROGRESS_STORE], "readonly");
            const store = transaction.objectStore(PROGRESS_STORE);
            const request = store.get("current_progress");
            request.onsuccess = () => resolve(request.result);
            request.onerror = () => reject(request.error);
        });
    }
    
    async function saveResultToDB(resultData) {
        if (!db) await initDatabase();
        return new Promise((resolve, reject) => {
            const transaction = db.transaction([RESULTS_STORE], "readwrite");
            const store = transaction.objectStore(RESULTS_STORE);
            const record = {
                timestamp: new Date().toISOString(),
                ...resultData
            };
            const request = store.add(record);
            request.onsuccess = () => resolve(request.result);
            request.onerror = () => reject(request.error);
        });
    }
    
    async function clearProgressFromDB() {
        if (!db) await initDatabase();
        return new Promise((resolve, reject) => {
            const transaction = db.transaction([PROGRESS_STORE], "readwrite");
            const store = transaction.objectStore(PROGRESS_STORE);
            const request = store.delete("current_progress");
            request.onsuccess = () => resolve();
            request.onerror = () => reject(request.error);
        });
    }
    
    function showToast(message, isError = false) {
        const toast = document.getElementById("toastMsg");
        toast.textContent = message;
        toast.style.background = isError ? "#b23c1c" : "#2c7da0";
        toast.style.opacity = "1";
        setTimeout(() => { toast.style.opacity = "0"; }, 3000);
    }
    
    // ========== Email Function ==========
    async function sendResultsEmail(resultData, studentName = "Student") {
        if (EMAILJS_PUBLIC_KEY === "YOUR_PUBLIC_KEY") {
            console.log("EmailJS not configured. Results:", resultData);
            showToast("Email not sent - configure EmailJS keys", false);
            return false;
        }
        try {
            const emailParams = {
                to_email: RECIPIENT_EMAIL,
                student_name: studentName,
                score: resultData.score,
                total_marks: resultData.totalMarks,
                percentage: resultData.percent.toFixed(1),
                grade: resultData.grade,
                weak_topics: resultData.weakTopics.join(", ") || "None",
                exam_date: new Date().toLocaleString(),
                details_summary: resultData.details.slice(0, 15).map(d => `Q${d.qNum}: ${d.earned}/${d.max}`).join("; ")
            };
            await emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, emailParams);
            showToast("✅ Results emailed successfully!", false);
            return true;
        } catch(e) {
            console.error("Email error:", e);
            showToast("⚠️ Email failed - check EmailJS configuration", true);
            return false;
        }
    }

        { id:"q8aiii", type:"written", text:"8(a)(iii) Explain why breathing rates remain high for five minutes after finishing exercise.", correctKeywords:["(remove) lactic acid","anaerobic respiration","oxygen debt","EPOC"], marks:2, requiredKeywords:2, topic:"Respiratory system/Exercise", msText:"(remove) lactic acid (1); anaerobic respiration (1); oxygen debt / EPOC / excess post-exercise oxygen consumption (1)" },

        { id:"q10ai", type:"mcq", text:"10(a)(i) Which hormone causes the development of secondary sexual characteristics in girls?", options:["A adrenaline","B oestrogen","C progesterone","D testosterone"], correct:"B oestrogen", marks:1, topic:"Hormones/Reproduction", msText:"B oestrogen" },
        { id:"q10aii", type:"mcq", text:"10(a)(ii) Which hormone causes an increased blood flow to the muscles during exercise?", options:["A adrenaline","B insulin","C progesterone","D testosterone"], correct:"A adrenaline", marks:1, topic:"Hormones/Exercise", msText:"A adrenaline" },
        { id:"q10aiii", type:"mcq", text:"10(a)(iii) Which of these is a correct statement about hormones?", options:["A they always produce short-term changes","B they are carried by neurones","C they are transported in the plasma","D they always produce a rapid response"], correct:"C they are transported in the plasma", marks:1, topic:"Hormones", msText:"C they are transported in the plasma" },
        { id:"q10b", type:"written", text:"10(b) Suggest why some biologists do not consider auxin to be a hormone.", correctKeywords:["auxin transported in xylem/phloem not blood","auxin produced in tips not from endocrine glands","auxin has different effect on roots and shoots"], marks:2, requiredKeywords:2, topic:"Plant hormones", msText:"auxin transported in xylem / phloem / auxin not transported in blood / plasma (1); auxin produced in tips / eq auxin not from endocrine / glands / organs (1); auxin has different effect on roots and shoots / eq (1)" },
        { id:"q10c", type:"written", text:"10(c) Describe an investigation to find the best concentration of plant growth substance to stimulate root growth.", correctKeywords:["different concentrations","same species/type/age/size","repeat","count number/length of roots","stated time period","same temperature/oxygen/light","same compost/water"], marks:6, requiredKeywords:6, topic:"Practical/Plant hormones", msText:"C change / different concentrations of growth substances (1); O same species / same plant / same type of plant/ named plant / same age / same size (1); R repeat (1); M1 count number of roots / length of roots / measure roots with ruler (1); M2 stated time period of one day plus (1); S1 same (control) temperature / oxygen / light / carbon dioxide (1); S2 same compost / water / humidity / soil / mineral ions / named mineral ion / same volume of plant growth substance (1)" }
    ];

    let userAnswers = new Array(questionsData.length).fill("");
    let userManualMarks = new Array(questionsData.length).fill(null);
    let currentQIndex = 0;
    let examSubmitted = false;
    let timerInterval;
    let timeSeconds = 120 * 60;
    let autoSaveInterval = null;

    function formatTime(sec) { let h=Math.floor(sec/3600), m=Math.floor((sec%3600)/60), s=sec%60; return `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`; }
    function updateTimerDisplay() { document.getElementById("timerDisplay").innerHTML = formatTime(timeSeconds); if(timeSeconds<=0 && !examSubmitted) autoSubmit(); }
    function autoSubmit() { clearInterval(timerInterval); submitExam(); }
    
    function startTimer() { 
        if(timerInterval) clearInterval(timerInterval);
        timerInterval = setInterval(()=>{ 
            if(!examSubmitted && timeSeconds > 0){ 
                timeSeconds--; 
                updateTimerDisplay(); 
            } else if(timeSeconds <= 0 && !examSubmitted) {
                autoSubmit();
            }
        }, 1000);
    }

    function renderNavigation() {
        const navDiv = document.getElementById("navContainer");
        navDiv.innerHTML = "";
        questionsData.forEach((_, idx) => {
            const btn = document.createElement("button");
            btn.innerText = idx+1;
            btn.classList.add("nav-btn");
            if(userAnswers[idx] && userAnswers[idx].toString().trim() !== "") btn.classList.add("answered");
            if(idx === currentQIndex) btn.classList.add("active");
            btn.onclick = () => { if(!examSubmitted) goToQuestion(idx); };
            navDiv.appendChild(btn);
        });
        updateAnsweredCounter();
    }
    
    function updateAnsweredCounter() {
        let answered = userAnswers.filter(a => a && a.toString().trim() !== "").length;
        document.getElementById("answeredCounter").innerHTML = `✅ Attempted: ${answered} / ${questionsData.length} questions`;
    }
    
    function goToQuestion(idx) {
        if(examSubmitted) return;
        document.querySelectorAll(".question-card").forEach(card => card.classList.remove("active-question"));
        currentQIndex = idx;
        const target = document.getElementById(`qcard-${idx}`);
        if(target) target.classList.add("active-question");
        renderNavigation();
    }
    
    function saveAnswer(idx, value) {
        if(examSubmitted) return;
        userAnswers[idx] = value;
        updateAnsweredCounter();
        renderNavigation();
    }
    
    function setManualMark(idx, markValue) {
        if(examSubmitted) return;
        let num = parseInt(markValue);
        if(isNaN(num)) num = 0;
        let maxMarks = questionsData[idx].marks;
        if(num > maxMarks) num = maxMarks;
        if(num < 0) num = 0;
        userManualMarks[idx] = num;
    }
    
    function toggleMarkScheme(idx) {
        let panel = document.getElementById(`ms-panel-${idx}`);
        if(panel) panel.classList.toggle("visible");
    }

    function buildQuestionsHTML() {
        const container = document.getElementById("questionsContainer");
        container.innerHTML = "";
        questionsData.forEach((q, idx) => {
            const card = document.createElement("div");
            card.className = "question-card";
            if(idx === 0) card.classList.add("active-question");
            card.id = `qcard-${idx}`;
            let inner = `<div class="q-title">Q${idx+1} (${q.topic}) <span class="marks">${q.marks} marks</span></div><div>${q.text}</div>`;
            
            if(q.type === "mcq") {
                inner += `<div class="subquestion">`;
                q.options.forEach(opt => {
                    let checked = (userAnswers[idx] === opt) ? "checked" : "";
                    inner += `<label class="mcq-option"><input type="radio" name="q${idx}" value="${opt}" ${checked} onchange="saveAnswer(${idx}, this.value)"> ${opt}</label><br>`;
                });
                inner += `</div>`;
            } else if(q.type === "calc") {
                let val = userAnswers[idx] || "";
                inner += `<div class="subquestion"><input type="text" placeholder="Your numeric answer..." value="${val.replace(/"/g, '&quot;')}" onchange="saveAnswer(${idx}, this.value)"></div>`;
            } else {
                let val = userAnswers[idx] || "";
                inner += `<div class="subquestion"><textarea rows="3" placeholder="Write your answer..." onchange="saveAnswer(${idx}, this.value)">${val}</textarea></div>`;
            }
            
            if(q.type !== "mcq") {
                inner += `<div style="margin-top: 12px;"><button type="button" class="small" onclick="toggleMarkScheme(${idx})">📖 Show / Hide Mark Scheme</button>`;
                inner += `<div id="ms-panel-${idx}" class="mark-scheme-panel"><strong>📌 Mark Scheme:</strong><br>${q.msText}</div>`;
                let selectedVal = (userManualMarks[idx] !== null) ? userManualMarks[idx] : "";
                inner += `<div class="marks-earned-row"><span>✍️ Self-assess marks earned (0 to ${q.marks}): </span>
                          <select onchange="setManualMark(${idx}, this.value)">
                            <option value="">-- select --</option>`;
                for(let m=0; m<=q.marks; m++) {
                    let sel = (selectedVal === m) ? "selected" : "";
                    inner += `<option value="${m}" ${sel}>${m} / ${q.marks}</option>`;
                }
                inner += `</select></div></div>`;
            } else {
                inner += `<div style="margin-top: 8px;"><button type="button" class="small" onclick="toggleMarkScheme(${idx})">📖 Show Mark Scheme</button>
                          <div id="ms-panel-${idx}" class="mark-scheme-panel"><strong>Answer:</strong> ${q.msText}</div></div>`;
            }
            
            if(q.text.includes("diagram") || q.text.includes("graph") || q.text.includes("Diagram")) {
                inner += `<div class="placeholder-img">📊 [Figure/Graph/Diagram placeholder - refer to original paper]</div>`;
            }
            card.innerHTML = inner;
            container.appendChild(card);
        });
    }

    function getFinalMark(q, idx, answer) {
        if(q.type === "mcq") {
            if(!answer) return 0;
            return answer.toLowerCase().trim() === q.correct.toLowerCase() ? q.marks : 0;
        }
        if(q.type === "calc") {
            if(!answer) return 0;
            let num = parseFloat(answer);
            if(isNaN(num)) return 0;
            return Math.abs(num - q.correctValue) <= q.tolerance ? q.marks : 0;
        }
        if(userManualMarks[idx] !== null && userManualMarks[idx] !== undefined) {
            return Math.min(userManualMarks[idx], q.marks);
        }
        if(!answer) return 0;
        let a = answer.toLowerCase();
        let kw = q.correctKeywords || [];
        let required = q.requiredKeywords || 1;
        let count = kw.filter(k => a.includes(k.toLowerCase())).length;
        return Math.min(count, q.marks);
    }

    function getGrade(percent) {
        if(percent >= 85) return "9 (excellent)";
        if(percent >= 78) return "8 (strong)";
        if(percent >= 70) return "7 (good)";
        if(percent >= 62) return "6 (high merit)";
        if(percent >= 54) return "5 (merit)";
        if(percent >= 45) return "4 (standard pass)";
        if(percent >= 35) return "3";
        if(percent >= 25) return "2";
        return "1";
    }

    async function submitExam() {
        if(examSubmitted) return;
        clearInterval(timerInterval);
        if(autoSaveInterval) clearInterval(autoSaveInterval);
        examSubmitted = true;
        
        let totalEarned = 0, totalPossible = 0;
        let topicScores = {};
        let details = [];
        
        for(let i=0; i<questionsData.length; i++) {
            let q = questionsData[i];
            let ans = userAnswers[i] || "";
            let earned = getFinalMark(q, i, ans);
            totalEarned += earned;
            totalPossible += q.marks;
            let topic = q.topic || "General";
            if(!topicScores[topic]) topicScores[topic] = { earned:0, total:0 };
            topicScores[topic].earned += earned;
            topicScores[topic].total += q.marks;
            details.push({ qNum: i+1, topic: topic, answer: ans.substring(0,60), earned: earned, max: q.marks, scheme: q.msText });
        }
        
        let percent = (totalEarned/totalPossible)*100;
        let grade = getGrade(percent);
        
        let weakTopics = [];
        for(let [topic, data] of Object.entries(topicScores)) {
            let topicPercent = (data.earned / data.total) * 100;
            if(topicPercent < 55) weakTopics.push(topic);
        }
        weakTopics.sort();
        
        const resultData = {
            score: totalEarned,
            totalMarks: totalPossible,
            percent: percent,
            grade: grade,
            weakTopics: weakTopics,
            topicScores: topicScores,
            details: details
        };
        
        await saveResultToDB(resultData);
        await sendResultsEmail(resultData);
        
        const reviewDiv = document.getElementById("reviewPanel");
        reviewDiv.classList.remove("hidden");
        let html = `<h2>📊 Exam Results — Final Mark</h2><div class="score-badge">Score: ${totalEarned} / ${totalPossible} (${percent.toFixed(1)}%)</div>
        <div class="grade-box"><strong>Edexcel IGCSE 9–1 grade: ${grade}</strong> (Boundaries: 9≥85%, 8≥78%, 7≥70%, 6≥62%, 5≥54%, 4≥45%)</div>`;
        
        if(weakTopics.length > 0) {
            html += `<div class="weakness-box"><h3>⚠️ Weaker areas (below 55%)</h3><ul>`;
            weakTopics.forEach(w => { 
                let data = topicScores[w];
                html += `<li><strong>${w}</strong>: ${data.earned}/${data.total} marks (${((data.earned/data.total)*100).toFixed(1)}%) — review this topic.</li>`;
            });
            html += `</ul></div>`;
        } else {
            html += `<div class="weakness-box"><h3>✅ No weak areas identified (all ≥55%). Great work!</h3></div>`;
        }
        
        html += `<p><strong>Detailed breakdown (first 15 questions):</strong></p><ul>`;
        details.slice(0, 15).forEach((d,i) => { 
            html += `<li><strong>Q${d.qNum} (${d.topic})</strong> [${d.max} marks]: earned ${d.earned}<br>Your answer: "${d.answer || 'blank'}"<br>📖 MS: ${d.scheme.substring(0, 100)}...</li>`;
        });
        if(details.length > 15) html += `<li><em>... and ${details.length-15} more questions (see console or database for full details)</em></li>`;
        html += `</ul><p>✅ Results saved to database and attempted to email. Progress cleared from database.</p>`;
        reviewDiv.innerHTML = html;
        
        document.querySelectorAll("input, textarea, button.nav-btn, #prevBtn, #nextBtn, select").forEach(el => { 
            if(el.id !== "submitBtn") el.disabled = true; 
        });
        document.getElementById("submitBtn").disabled = true;
        
        await clearProgressFromDB();
        showToast("✅ Exam submitted! Results saved to database.", false);
    }

    async function saveProgress() {
        await saveProgressToDB(userAnswers, userManualMarks, timeSeconds);
        showToast("✅ Progress saved to database!", false);
    }
    
    async function loadProgress() {
        if(examSubmitted) { showToast("Exam already submitted.", true); return; }
        try {
            const saved = await loadProgressFromDB();
            if(saved && saved.answers && saved.answers.length === userAnswers.length) {
                userAnswers = saved.answers;
                if(saved.manualMarks) userManualMarks = saved.manualMarks;
                if(saved.timeRemaining && saved.timeRemaining > 0 && saved.timeRemaining < 7200) {
                    timeSeconds = saved.timeRemaining;
                    updateTimerDisplay();
                }
                rebuildInputsFromAnswers();
                renderNavigation();
                showToast("✅ Progress loaded from database!", false);
            } else {
                showToast("No saved progress found in database.", true);
            }
        } catch(e) {
            showToast("Error loading progress.", true);
        }
    }
    
    async function clearDatabase() {
        if(confirm("Clear ALL saved progress from database? This cannot be undone.")) {
            await clearProgressFromDB();
            showToast("✅ Database progress cleared.", false);
        }
    }
    
    function rebuildInputsFromAnswers() {
        buildQuestionsHTML();
        for(let i=0; i<userAnswers.length; i++) {
            let val = userAnswers[i];
            if(val && val !== "") {
                let radios = document.querySelectorAll(`input[name="q${i}"]`);
                if(radios.length) {
                    radios.forEach(r => { if(r.value === val) r.checked = true; });
                } else {
                    let inputField = document.querySelector(`#qcard-${i} textarea, #qcard-${i} input[type="text"]`);
                    if(inputField) inputField.value = val;
                }
            }
            if(userManualMarks[i] !== null && userManualMarks[i] !== undefined) {
                let selectEl = document.querySelector(`#qcard-${i} select`);
                if(selectEl) selectEl.value = userManualMarks[i];
            }
        }
        renderNavigation();
    }
    
    async function autoSaveToDB() {
        if(!examSubmitted) {
            await saveProgressToDB(userAnswers, userManualMarks, timeSeconds);
        }
    }

    window.saveAnswer = saveAnswer;
    window.setManualMark = setManualMark;
    window.toggleMarkScheme = toggleMarkScheme;
    window.goToQuestion = goToQuestion;
    
    window.onload = async () => {
        await initDatabase();
        
        // Try to load existing progress
        try {
            const saved = await loadProgressFromDB();
            if(saved && saved.answers && saved.answers.length === userAnswers.length) {
                userAnswers = saved.answers;
                if(saved.manualMarks) userManualMarks = saved.manualMarks;
                if(saved.timeRemaining && saved.timeRemaining > 0 && saved.timeRemaining < 7200) {
                    timeSeconds = saved.timeRemaining;
                }
                showToast("📀 Previous session restored from database", false);
            }
        } catch(e) { console.log("No existing progress"); }
        
        buildQuestionsHTML();
        renderNavigation();
        startTimer();
        
        // Auto-save every 30 seconds to database
        autoSaveInterval = setInterval(autoSaveToDB, 30000);
        
        document.getElementById("nextBtn").onclick = () => { if(currentQIndex+1 < questionsData.length && !examSubmitted) goToQuestion(currentQIndex+1); };
        document.getElementById("prevBtn").onclick = () => { if(currentQIndex-1 >=0 && !examSubmitted) goToQuestion(currentQIndex-1); };
        document.getElementById("submitBtn").onclick = () => { if(confirm("Submit exam? Results will be saved to database and emailed.")) submitExam(); };
        document.getElementById("saveResponsesBtn").onclick = saveProgress;
        document.getElementById("loadResponsesBtn").onclick = loadProgress;
        document.getElementById("clearDatabaseBtn").onclick = clearDatabase;
    };
</script>
