name: Deploy to GitHub Pages

on:
  push:
    branches: ["main", "master"]  # Adjust to your default branch name
  workflow_dispatch:  # Allows manual trigger

# Sets permissions for GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4  # Updated to v4
      
      - name: Setup Pages
        uses: actions/configure-pages@v4
      
      - name: Replace API key placeholder
        run: |
          # Debug: Check if file exists
          echo "Current directory contents:"
          ls -la
          
          # Find all HTML files (including index.html and all 1B*.html files)
          HTML_FILES=$(find . -maxdepth 1 -name "*.html" -type f)
          
          if [ -z "$HTML_FILES" ]; then
            echo "❌ ERROR: No HTML files found in repository root!"
            exit 1
          fi
          
          echo "📁 Found HTML files:"
          echo "$HTML_FILES"
          
          # Process each HTML file
          for file in $HTML_FILES; do
            echo "Processing: $file"
            
            # Show before replacement (first few lines)
            echo "  📄 Before replacement in $file:"
            head -n 5 "$file" | grep -i "OPENAI_API_KEY" || echo "  Key not in first 5 lines"
            
            # Replace placeholder with actual secret
            sed -i "s/OPENAI_API_KEY_PLACEHOLDER/${{ secrets.OPENAI_API_KEY }}/g" "$file"
            
            # Verify replacement worked for this file
            if grep -q "OPENAI_API_KEY_PLACEHOLDER" "$file"; then
              echo "  ❌ ERROR: Placeholder still exists in $file!"
              exit 1
            else
              echo "  ✅ Placeholder successfully replaced in $file"
            fi
          done
          
          echo "🎉 All HTML files processed successfully!"
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./
      
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
