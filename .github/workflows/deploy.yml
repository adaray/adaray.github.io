name: Deploy to GitHub Pages

on:
  push:
    branches: ["main", "master"]  # Adjust to your default branch name
  workflow_dispatch:  # Allows manual trigger

# Sets permissions for GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4  # Updated to v4
      
      - name: Setup Pages
        uses: actions/configure-pages@v4
      
      - name: Replace API key placeholder
        run: |
          # Debug: Check if file exists
          echo "Current directory contents:"
          ls -la
          
          # Check if index.html exists
          if [ -f "index.html" ]; then
            echo "✅ index.html found"
            
            # Show before replacement (first few lines)
            echo "📄 Before replacement:"
            head -n 5 index.html | grep -i "OPENAI_API_KEY" || echo "Key not in first 5 lines"
            
            # Replace placeholder with actual secret
            sed -i "s/OPENAI_API_KEY_PLACEHOLDER/${{ secrets.OPENAI_API_KEY }}/g" index.html
            
            # Verify replacement worked
            echo "📄 After replacement:"
            grep -n "OPENAI_API_KEY" index.html | head -n 2
            
            # Security: Verify no placeholder remains
            if grep -q "OPENAI_API_KEY_PLACEHOLDER" index.html; then
              echo "❌ ERROR: Placeholder still exists!"
              exit 1
            else
              echo "✅ Placeholder successfully replaced"
            fi
          else
            echo "❌ ERROR: index.html not found in repository root!"
            echo "Files in root:"
            ls -la
            exit 1
          fi
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./
      
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
