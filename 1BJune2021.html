<html lang="en">
<head>

    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>   
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 20px;
            color: #1e2a3e;
        }
        .exam-container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 28px;
            box-shadow: 0 12px 30px rgba(0,0,0,0.1);
            overflow: hidden;
            padding: 20px 30px 40px;
        }
        .header {
            border-bottom: 3px solid #2c7da0;
            padding-bottom: 15px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
        }
        .title h1 { margin: 0; font-size: 1.7rem; color: #0b3b4f; }
        .title p { margin: 5px 0 0; color: #2c7da0; font-weight: 500; }
        .timer-area { background: #1e2a3e; padding: 8px 18px; border-radius: 60px; color: white; text-align: center; font-weight: bold; }
        .timer { font-size: 2rem; font-family: monospace; letter-spacing: 2px; }
        .info-bar {
            background: #e9f0f5;
            padding: 10px 20px;
            border-radius: 28px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
        }
        .question-nav {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 25px;
            border-bottom: 1px solid #cbd5e1;
            padding-bottom: 15px;
            max-height: 150px;
            overflow-y: auto;
        }
        .nav-btn {
            background: #eef2f6;
            border: none;
            width: 42px;
            height: 42px;
            border-radius: 42px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.1s;
            font-size: 0.9rem;
        }
        .nav-btn.active { background: #2c7da0; color: white; }
        .nav-btn.answered { background: #61a5c2; color: white; }
        .question-card {
            display: none;
            background: #ffffff;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 30px;
            border: 1px solid #e2e8f0;
        }
        .question-card.active-question { display: block; }
        .q-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 15px;
            background: #f0f6fa;
            padding: 6px 12px;
            border-radius: 30px;
            display: inline-block;
        }
        .marks { font-size: 0.8rem; background: #cbd5e1; border-radius: 20px; padding: 2px 10px; margin-left: 12px; }
        .subquestion { margin: 20px 0 20px 12px; border-left: 3px solid #cbd5e1; padding-left: 18px; }
        .placeholder-img {
            background: #eef2f9;
            border: 1px dashed #8ba0bc;
            padding: 20px;
            text-align: center;
            border-radius: 16px;
            margin: 15px 0;
            font-style: italic;
            color: #2c3e66;
        }
        .mcq-option { margin: 10px 0; }
        input[type="text"], input[type="number"], textarea {
            padding: 10px 14px;
            border-radius: 14px;
            border: 1px solid #b9c7d9;
            width: 100%;
            max-width: 550px;
            font-family: inherit;
        }
        textarea { max-width: 100%; }
        .action-buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 30px;
            gap: 12px;
            flex-wrap: wrap;
        }
        button { background: #2c7da0; border: none; padding: 10px 26px; border-radius: 40px; color: white; font-weight: bold; cursor: pointer; font-size: 0.9rem; }
        button.secondary { background: #6c757d; }
        button.warning { background: #b23c1c; }
        button:disabled { opacity: 0.6; cursor: not-allowed; }
        .review-section { background: #fef9e3; padding: 20px; border-radius: 20px; margin-top: 30px; }
        .hidden { display: none; }
        .score-badge { font-size: 2rem; font-weight: bold; color: #1e2a3e; }
        .grade-box { background: #d9e6f2; padding: 12px; border-radius: 24px; margin: 15px 0; }
        .weakness-box { background: #ffe6e6; padding: 16px; border-radius: 20px; margin-top: 20px; border-left: 8px solid #c7362b; }
        .feedback-table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        .feedback-table th, .feedback-table td { border: 1px solid #ddd; padding: 10px; vertical-align: top; text-align: left; }
        .feedback-table th { background: #2c7da0; color: white; }
        .feedback-table tr:nth-child(even) { background: #f9f9f9; }
        .correct-highlight { background: #d4edda; }
        .incorrect-highlight { background: #f8d7da; }
        details summary { cursor: pointer; font-weight: 600; margin: 15px 0; }
        footer { text-align: center; font-size: 0.8rem; margin-top: 30px; color: #6c757d; }
        .status-toast {
            position: fixed; bottom: 20px; right: 20px;
            background: #2c7da0; color: white; padding: 8px 16px;
            border-radius: 30px; font-size: 0.8rem; opacity: 0;
            transition: opacity 0.3s; pointer-events: none; z-index: 1000;
        }
        .loading-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            backdrop-filter: blur(3px);
        }
        .loading-spinner {
            background: white;
            padding: 30px 40px;
            border-radius: 30px;
            text-align: center;
            font-weight: bold;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }
        .spinner {
            border: 4px solid #e9f0f5;
            border-top: 4px solid #2c7da0;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @media (max-width: 700px) { .exam-container { padding: 15px; } .timer { font-size: 1.4rem; } .feedback-table { font-size: 0.8rem; } }
        .ai-badge { background: #4a6fa5; color: white; font-size: 0.7rem; border-radius: 20px; padding: 2px 10px; margin-left: 10px; vertical-align: middle; }
        .ms-badge { background: #f4a261; color: white; font-size: 0.7rem; border-radius: 20px; padding: 2px 10px; margin-left: 10px; vertical-align: middle; }
        .ms-panel { background: #f8f9fc; border-left: 5px solid #f4a261; padding: 12px 16px; margin-top: 15px; border-radius: 16px; font-size: 0.9rem; display: none; }
        .ms-panel.visible { display: block; }
        .marks-earned-row {
            margin-top: 12px;
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        .marks-earned-row select {
            padding: 6px 12px;
            border-radius: 30px;
            background: white;
            border: 1px solid #b9c7d9;
            font-weight: bold;
        }
        button.small {
            background: #e76f51;
            padding: 5px 12px;
            font-size: 0.7rem;
            border: none;
            border-radius: 30px;
            color: white;
            cursor: pointer;
        }
        .graph-badge {
            background: #f4a261;
            color: white;
            font-size: 0.7rem;
            border-radius: 20px;
            padding: 2px 10px;
            margin-left: 10px;
            vertical-align: middle;
        }
    </style>
</head>
<body>
<div class="exam-container" id="examApp">
    <div class="header">
        <div class="title">
            <h1>Edexcel IGCSE Biology (4BI1)</h1>
            <p>Biology Paper 1B | June 2021</p>
        </div>
        <div class="timer-area">
            <div>Time Remaining</div>
            <div class="timer" id="timerDisplay">02:00:00</div>
        </div>
    </div>
    <div class="info-bar">
        <span>⏱️ 2 hours | 📝 Total marks: 110</span>
        <span id="answeredCounter">📋 Questions answered: 0 / 55</span>
        <span id="graphCounter">📊 Graph/Practical questions: 0</span>
    </div>
    <div id="navContainer" class="question-nav"></div>
    <div id="questionsContainer"></div>
    <div class="action-buttons">
        <button id="prevBtn" class="secondary">◀ Previous</button>
        <button id="nextBtn">Next ▶</button>
        <button id="submitBtn" class="warning">Submit Exam</button>
    </div>
    <div id="reviewPanel" class="review-section hidden"></div>
    <div id="statusToast" class="status-toast"></div>
</div>

<script>
    
    const EXAM_TITLE = "Edexcel IGCSE Biology (4BI1) - June 2021 Paper 1B";

    // ========== DEEPSEEK CONFIGURATION ==========
    const DEEPSEEK_API_KEY="DEEPSEEK_API_KEY_PLACEHOLDER";  // <-- PASTE YOUR DEEPSEEK API KEY HERE
    const DEEPSEEK_MODEL = "deepseek-chat";
    const EMAILJS_PUBLIC_KEY = "PmVcThAzwAjgqOwSD";     // Replace with your EmailJS public key
    const EMAILJS_SERVICE_ID = "service_301bogs";   // Replace with your service ID
    const EMAILJS_TEMPLATE_ID = "template_mld7q9t"; // Replace with your template ID
    const RECIPIENT_EMAIL = "aisha.daray@gmail.com";
    
    if(EMAILJS_PUBLIC_KEY && EMAILJS_PUBLIC_KEY !== "YOUR_PUBLIC_KEY") {
        try {
            emailjs.init(EMAILJS_PUBLIC_KEY);
        } catch(e) {
            console.log("EmailJS init error:", e);
        }
    }
    
    // ========== AUTO DETECTION FUNCTION FOR GRAPH QUESTIONS ==========
    // This function automatically detects if a question requires graph/drawing/plotting
 // MODIFIED: Only detects when type is 'graph' OR 'practical'
    function isGraphOrPracticalQuestion(question) {
        // Only return true if type is exactly 'graph' OR 'practical'
        return question.type === 'graph' || question.type === 'practical';
    }
    
    // ========== IndexedDB Setup ==========
    const DB_NAME = "IGCSE_Biology_Exam_DB";
    const DB_VERSION = 2;
    const PROGRESS_STORE = "exam_progress";
    const RESULTS_STORE = "exam_results";
    let db = null;
    
    function initDatabase() {
        return new Promise((resolve, reject) => {
            const request = indexedDB.open(DB_NAME, DB_VERSION);
            request.onerror = () => reject(request.error);
            request.onsuccess = () => {
                db = request.result;
                resolve(db);
            };
            request.onupgradeneeded = (event) => {
                const dbEvent = event.target.result;
                if (!dbEvent.objectStoreNames.contains(PROGRESS_STORE)) {
                    dbEvent.createObjectStore(PROGRESS_STORE, { keyPath: "id" });
                }
                if (!dbEvent.objectStoreNames.contains(RESULTS_STORE)) {
                    dbEvent.createObjectStore(RESULTS_STORE, { keyPath: "id", autoIncrement: true });
                }
            };
        });
    }
    
    async function saveProgressToDB(answers, manualMarks, timeLeft) {
        if (!db) await initDatabase();
        return new Promise((resolve, reject) => {
            const transaction = db.transaction([PROGRESS_STORE], "readwrite");
            const store = transaction.objectStore(PROGRESS_STORE);
            const record = {
                id: "current_progress",
                answers: answers,
                manualMarks: manualMarks,
                timeRemaining: timeLeft,
                timestamp: new Date().toISOString()
            };
            const request = store.put(record);
            request.onsuccess = () => resolve();
            request.onerror = () => reject(request.error);
        });
    }
    
    async function loadProgressFromDB() {
        if (!db) await initDatabase();
        return new Promise((resolve, reject) => {
            const transaction = db.transaction([PROGRESS_STORE], "readonly");
            const store = transaction.objectStore(PROGRESS_STORE);
            const request = store.get("current_progress");
            request.onsuccess = () => resolve(request.result);
            request.onerror = () => reject(request.error);
        });
    }
    
    async function saveResultToDB(resultData) {
        if (!db) await initDatabase();
        return new Promise((resolve, reject) => {
            const transaction = db.transaction([RESULTS_STORE], "readwrite");
            const store = transaction.objectStore(RESULTS_STORE);
            const record = {
                timestamp: new Date().toISOString(),
                ...resultData
            };
            const request = store.add(record);
            request.onsuccess = () => resolve(request.result);
            request.onerror = () => reject(request.error);
        });
    }
    
    async function clearProgressFromDB() {
        if (!db) await initDatabase();
        return new Promise((resolve, reject) => {
            const transaction = db.transaction([PROGRESS_STORE], "readwrite");
            const store = transaction.objectStore(PROGRESS_STORE);
            const request = store.delete("current_progress");
            request.onsuccess = () => resolve();
            request.onerror = () => reject(request.error);
        });
    }
    
    function showToast(message, isError = false) {
        const toast = document.getElementById("statusToast");
        if (!toast) return;
        toast.textContent = message;
        toast.style.background = isError ? "#b23c1c" : "#2c7da0";
        toast.style.opacity = "1";
        setTimeout(() => { toast.style.opacity = "0"; }, 3000);
    }
    
    async function sendResultsEmail(resultData, studentName = "Student") {
        if (EMAILJS_PUBLIC_KEY === "YOUR_PUBLIC_KEY") {
            console.log("EmailJS not configured. Results:", resultData);
            showToast("Email not sent - configure EmailJS keys", false);
            return false;
        }
        try {
            const emailParams = {
                EXAM_TITLE: EXAM_TITLE,
                to_email: RECIPIENT_EMAIL,
                student_name: studentName,
                score: resultData.score,
                total_marks: resultData.totalMarks,
                percentage: resultData.percent.toFixed(1),
                grade: resultData.grade,
                weak_topics: resultData.weakTopics.join(", ") || "None",
                exam_date: new Date().toLocaleString(),
                details_summary: resultData.details.map(d => `Q${d.qNum}: ${d.earned}/${d.max}`).join("; ")
            };
            await emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, emailParams);
            showToast("✅ Results emailed successfully!", false);
            return true;
        } catch(e) {
            console.error("Email error:", e);
            showToast("⚠️ Email failed - check EmailJS configuration", true);
            return false;
        }
    }
    
    // ========== Question Bank (without isGraphical flag - will be auto-detected) ==========
    const questionsDataRaw = [
        { id:"q1a", type:"table", text:"1(a) Complete the table by naming pieces of laboratory apparatus that can be used to help obtain these values.", subfields:["heat produced by germinating seeds","surface area to volume ratio of a potato cylinder","breathing rate of a human","volume of gas produced by yeast in anaerobic respiration"], correct:["thermometer / temperature probe / data logger","ruler","clock / watch / timer / spirometer","syringe / measuring cylinder / respirometer"], marks:4, topic:"Practical/Apparatus", msText:"thermometer / temperature probe / data logger (1); ruler (1); clock / watch / timer / spirometer (1); syringe / measuring cylinder / respirometer (1)" },
        { id:"q1b", type:"calc", text:"1(b) Calculate the magnification of the red blood cell (drawing width 5.3cm, actual width 8μm).", correctValue:6625, tolerance:125, marks:2, topic:"Microscopy/Maths", msText:"width of cell = 5.3 cm; width of cell in μm = 53 000 μm ÷ 8 = 6625 (6250 to 6750) (2)" },
        { id:"q2ai", type:"mcq", text:"2(a)(i) Which blood vessel brings oxygenated blood to the heart?", options:["A","B","C","D"], correct:"D", marks:1, topic:"Circulation/Heart", msText:"D" },
        { id:"q2aii", type:"mcq", text:"2(a)(ii) Which blood vessel contains blood at the highest pressure?", options:["A","B","C","D"], correct:"C", marks:1, topic:"Circulation/Heart", msText:"C" },
        { id:"q2bi", type:"practical", text:"2(b)(i) Draw a label line on the diagram to show the position of a semi-lunar valve.", correctKeywords:["semi-lunar valve at base of aorta/pulmonary artery"], marks:1, topic:"Circulation/Heart", msText:"(Drawing label line at correct valve position)" },
        { id:"q2bii", type:"written", text:"2(b)(ii) Describe the function of the semi-lunar valves.", correctKeywords:["prevent backflow of blood","one way flow","from arteries into ventricle"], marks:2, requiredKeywords:2, topic:"Circulation/Heart", msText:"prevent backflow of blood / one way flow (1); (from arteries) into ventricle/ventricles (1)" },
        { id:"q2ci", type:"written", text:"2(c)(i) Explain why the hole between atria in a foetal heart is normally closed before the baby is born.", correctKeywords:["oxygenated and deoxygenated blood do not mix","left hand side contains oxygenated blood from lungs","oxygenated blood pumped around body","deoxygenated blood does not go round body"], marks:2, requiredKeywords:2, topic:"Circulation/Heart", msText:"so that oxygenated and deoxygenated blood do not mix / as left hand side now contains oxygenated blood from lungs (1); so that oxygenated blood can be pumped around body / so deoxygenated blood does not go round body / so oxygenated blood does not go to lungs (1)" },
        { id:"q2cii", type:"written", text:"2(c)(ii) Explain what effect this hole not closing will have on the baby.", correctKeywords:["may appear blue / lack colour / not survive / shortness of breath","less oxygen transported","deoxygenated blood goes to body","less (aerobic) respiration","less energy / less ATP"], marks:3, requiredKeywords:3, topic:"Circulation/Heart", msText:"may appear blue / lack colour / not survive / shortness of breath (1); as less oxygen (transported from heart to body) / deoxygenated blood goes to body (1); less (aerobic) respiration (1); less energy / less ATP (1)" },
        { id:"q3a", type:"written", text:"3(a) Describe how the student tests leaf X to show the effect of light on photosynthesis.", correctKeywords:["boil leaf in water","boil in ethanol (to remove chlorophyll)","hot water bath","soak in water (to rehydrate)","add iodine solution","blue black (leaf uncovered) starch present / yellow (leaf covered) no starch"], marks:4, requiredKeywords:4, topic:"Photosynthesis/Practical", msText:"boil leaf in water (1); boil in ethanol (to remove chlorophyll) (1); hot water bath / kettle / turn off Bunsen (1); soak in water (to rehydrate / allow diffusion) (1); add iodine solution (1); blue black / eq (leaf uncovered) starch present / yellow / eq no starch (leaf covered) (1)" },
        { id:"q3bi", type:"written", text:"3(b)(i) Explain the student's results (effect of CO2 concentration on photosynthesis rate at two light intensities).", correctKeywords:["increasing CO2 increases rate","CO2 required / substrate for photosynthesis","greater higher rate at high light intensity","light required / provides energy for photosynthesis","increase same from 0.00 to 0.02 in both","levelling at high light intensity due to temperature/chloroplasts"], marks:4, requiredKeywords:4, topic:"Photosynthesis/Factors", msText:"increasing carbon dioxide increases rate (1); CO2 required / substrate (for photosynthesis) (1); greater higher (in rate) at high light intensity (1); light required / provides energy for photosynthesis (1); increase is same from 0.00 to 0.02 / first two readings (in both light intensities) (1); levelling at (high light intensity) due to temperature / number of chloroplasts / amount of chlorophyll (1)" },
        { id:"q3bii", type:"written", text:"3(b)(ii) Give the dependent variable in this investigation.", correctKeywords:["(number of) bubbles (per minute)","rate of photosynthesis","rate of oxygen production"], marks:1, topic:"Practical/Variables", msText:"(number of) bubbles (per minute) / rate of photosynthesis / rate of oxygen production" },
        { id:"q3biii", type:"written", text:"3(b)(iii) Give one way in which the student could control the biotic variable in this investigation.", correctKeywords:["same type/species/mass/number of leaves/length/size","same piece of plant"], marks:1, topic:"Practical/Variables", msText:"same type / species / mass / number of leaves / length / size same piece of plant" },
        { id:"q4ai", type:"mcq", text:"4(a)(i) Which row of the table is correct for this yeast cell (substance in cell wall, substance stored in cytoplasm)?", options:["A cellulose / glycogen","B cellulose / starch","C chitin / glycogen","D chitin / starch"], correct:"C chitin / glycogen", marks:1, topic:"Cell Biology/Fungi", msText:"C chitin glycogen" },
        { id:"q4aii", type:"mcq", text:"4(a)(ii) Which type of organism is a yeast cell?", options:["A a bacterium","B a fungus","C a plant","D a protist"], correct:"B a fungus", marks:1, topic:"Classification", msText:"B fungus" },
        { id:"q4bi", type:"mcq", text:"4(b)(i) Which of these equations shows the respiration in the yeast (ethanol production)?", options:["A glucose → ethanol","B glucose → ethanol + carbon dioxide","C glucose + oxygen → ethanol","D glucose + oxygen → ethanol + carbon dioxide"], correct:"B glucose → ethanol + carbon dioxide", marks:1, topic:"Respiration/Anaerobic", msText:"B glucose → ethanol + carbon dioxide" },
        { id:"q4bii", type:"written", text:"4(b)(ii) Name an enzyme used by scientists to genetically modify the yeast.", correctKeywords:["restriction","endonuclease","ligase"], marks:1, topic:"Genetic modification", msText:"restriction / endonuclease / ligase" },
        { id:"q4biii", type:"written", text:"4(b)(iii) State what is meant by the term recombinant (GM yeast).", correctKeywords:["contains new DNA / foreign DNA / foreign gene","DNA from other organism/species","gene for digesting cell walls/cellulose"], marks:1, topic:"Genetic modification", msText:"contains new DNA / new gene / foreign DNA / foreign gene / altered genes / DNA from other organism / DNA from other species / gene from other organism / gene form other species / contains gene for digesting cell walls / contains gene for digesting cellulose / gene for cellulase" },
        { id:"q4biv", type:"written", text:"4(b)(iv) Suggest why biofuel produced using glucose from plants could reduce global warming.", correctKeywords:["less burning of fossil fuels","less carbon dioxide in air","carbon neutral","plants use CO2 in photosynthesis","less trapping of heat / less greenhouse effect","uses renewable resource"], marks:2, requiredKeywords:2, topic:"Environment/Biofuels", msText:"less burning of fossil fuels (1); less carbon dioxide in air / carbon neutral / plants use CO2 (in photosynthesis) (1); less trapping of heat / less greenhouse effect (1); uses renewable resource (1)" },
        { id:"q4ci", type:"calc", text:"4(c)(i) Calculate the percentage increase in the mass of ethanol produced by GM yeast compared to normal yeast after 1 day (GM 2.2g, normal ~1.25g).", correctValue:76, tolerance:8, marks:2, topic:"Maths/Percentages", msText:"2.2 - 1.25 = 0.95; 0.95 ÷ 1.25 = 0.76; × 100 = 76% (2)" },
        { id:"q4cii", type:"written", text:"4(c)(ii) Give two reasons why the rate of ethanol production decreases after 1 day.", correctKeywords:["running out of glucose / food","(build-up of) ethanol","yeast cells die"], marks:2, requiredKeywords:2, topic:"Respiration/Fermentation", msText:"running out of glucose / food (1); (build-up of) ethanol (1); yeast cells die (1)" },
        { id:"q5a", type:"written", text:"5(a) Describe a method to measure the mean number of weeds per m² in each field.", correctKeywords:["quadrat","repeat","random / using coordinates","count / how many / amount / number","divide total count by area/number of quadrats"], marks:3, requiredKeywords:3, topic:"Ecology/Sampling", msText:"quadrat (1); repeat (1); random / using coordinates (1); count / how many / amount / number (1); divide total count by (area / number of) quadrats (1)" },
        { id:"q5b", type:"written", text:"5(b) Discuss the conclusion that biological control is a better way of controlling weeds than chemical control. Use data from the table.", correctKeywords:["BC numbers decline slower","CC numbers lower at start/February","BC numbers are overall lower","BC stays low / less variable","CC go up and down","BC no need to reapply","insects reproduce","BC less risk of pollution","BC less risk of resistance","BC is specific / not affect other food chains","BC no bioaccumulation","BC could become pest"], marks:5, requiredKeywords:5, topic:"Agriculture/Biological control", msText:"BC numbers decline slower / CC numbers lower at start / February (1); BC numbers are (overall) lower (1); BC stays low / less variable / CC go up and down (1); BC no need to reapply / insects reproduce (1); BC less risk of pollution (1); BC less risk of resistance (1); BC is specific / not affect (other) food chains (1); BC no bioaccumulation (1); BC could become pest (1)" },

    function autoSaveToLocal() {

            answers: userAnswers,

            timeRemaining: timeSeconds,
            timestamp: Date.now()
        };
        localStorage.setItem("igcse_bio_exam_autosave", JSON.stringify(saveData));

    function loadAutoSave() {
        const saved = localStorage.getItem("igcse_bio_exam_autosave");
        if(saved) {
            try {
                const data = JSON.parse(saved);
                if(data.answers && data.answers.length === userAnswers.length) {
                    userAnswers = data.answers;
                    if(data.manualMarks) userManualMarks = data.manualMarks;
                    if(data.timeRemaining && data.timeRemaining > 0 && data.timeRemaining < 7200) {
                        timeSeconds = data.timeRemaining;
                        updateTimerDisplay();
                    }
                    return true;
                }
            } catch(e) { console.log("Load error:", e); }
        }
        return false;
    }
    
    function formatTime(sec) { let h=Math.floor(sec/3600), m=Math.floor((sec%3600)/60), s=sec%60; return `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`; }
    function updateTimerDisplay() { document.getElementById("timerDisplay").innerText = formatTime(timeSeconds); if(timeSeconds<=0 && !examSubmitted) autoSubmitExam(); }

        timerInterval = setInterval(()=>{ 
            if(!examSubmitted && timeSeconds > 0){ 
                timeSeconds--; 
                updateTimerDisplay(); 
                if(timeSeconds % 30 === 0) autoSaveToLocal();
            } else if(timeSeconds <= 0 && !examSubmitted) {
                autoSubmitExam();
            }
        }, 1000);

    // Smart marking function (same as original)
    async function callDEEPSEEKForMark(question, studentAnswer, markScheme, maxMarks) {
        if(!DEEPSEEK_API_KEY || DEEPSEEK_API_KEY === "YOUR_DEEPSEEK_API_KEY") {
            if(!studentAnswer) return { score: 0, feedback: "No answer provided" };
            let keywords = question.correctKeywords || [];
            if(keywords.length === 0) return { score: 0, feedback: "No keywords defined for marking" };
            let ansLower = studentAnswer.toLowerCase();
            let matched = keywords.filter(kw => ansLower.includes(kw.toLowerCase())).length;
            let required = question.requiredKeywords || keywords.length;
            let score = Math.min(matched, required, maxMarks);
            let feedback = `Matched ${matched}/${required} key terms. Expected: ${keywords.join(", ")}`;
            return { score: score, feedback: feedback };
        }
        
        const prompt = `You are an Edexcel IGCSE Biology examiner. Award marks strictly based on the mark scheme and provide constructive feedback.
    Question: "${question.text}"
    Mark Scheme: "${markScheme}"
    Maximum marks: ${maxMarks}
    Student Answer: "${studentAnswer || '[no answer]'}"
    Return ONLY a JSON object: {"score": number (0-${maxMarks}), "feedback": "brief constructive feedback explaining what was good/missing"}. Do not include any other text.`;
        
        try {
            const response = await fetch("https://api.DEEPSEEK.com/v1/chat/completions", {
                method: "POST",
                headers: { "Content-Type": "application/json", "Authorization": `Bearer ${DEEPSEEK_API_KEY}` },
                body: JSON.stringify({ model: DEEPSEEK_MODEL, messages: [{ role: "user", content: prompt }], temperature: 0.1 })
            });
            if(!response.ok) throw new Error(`API error ${response.status}`);
            const data = await response.json();
            const result = JSON.parse(data.choices[0].message.content);
            return {
                score: Math.min(Math.max(0, parseInt(result.score) || 0), maxMarks),
                feedback: result.feedback || "AI assessment complete."
            };
        } catch(e) { 
            console.error("DEEPSEEK error:", e); 
            return { score: 0, feedback: "Smart marking error - please review manually" };
        }
    }
    
    async function submitAndMarkExam() {
        if(examSubmitted) return;
        clearInterval(timerInterval);
        if(autoSaveTimer) clearInterval(autoSaveTimer);        
        examSubmitted = true;
        
        showToast("🤖 AI is marking non-graphical questions...", false);
        const loadingDiv = document.createElement("div");
        loadingDiv.className = "loading-overlay";
        loadingDiv.innerHTML = `<div class="loading-spinner"><div class="spinner"></div><p>Marking in progress...</div>`;
        document.body.appendChild(loadingDiv);
        
        let totalEarned = 0, totalPossible = 0;
        let questionFeedback = [];
        
        for(let i=0; i<questionsData.length; i++) {
            let q = questionsData[i];
            let answer = userAnswers[i] || "";
            let earned = 0;
            let aiFeedback = "";
            
            if(q.isGraphical === true) {
                earned = (userManualMarks[i] !== null && !isNaN(userManualMarks[i])) ? userManualMarks[i] : 0;
                earned = Math.min(Math.max(0, earned), q.marks);
                aiFeedback = "Self-assessed by student (graph/diagram question - compared with mark scheme)";
            } else if(q.type === "mcq") {
                earned = (answer && answer.trim().toLowerCase() === (q.correct || "").toLowerCase()) ? q.marks : 0;
                aiFeedback = earned === q.marks ? "Correct answer selected" : "Incorrect answer - correct option: " + q.correct;
            } else if(q.type === "calc") {
                let num = parseFloat(answer);
                if(!isNaN(num) && Math.abs(num - q.correctValue) <= (q.tolerance || 0.01)) {
                    earned = q.marks;
                    aiFeedback = `Correct calculation (expected: ${q.correctValue})`;
                } else {
                    earned = 0;
                    aiFeedback = `Incorrect calculation. Expected: ${q.correctValue}, Got: ${answer || "no answer"}`;
                }
            } else {
                const aiResult = await callDEEPSEEKForMark(q, answer, q.msText, q.marks);
                earned = aiResult.score;
                aiFeedback = aiResult.feedback;
            }
            
            totalEarned += earned;
            totalPossible += q.marks;
            let status = earned === q.marks ? "✓ Full marks" : (earned === 0 ? "✗ No marks" : "⚠ Partial marks");
            
            questionFeedback.push({
                number: i+1, topic: q.topic, question: q.text,
                studentAnswer: answer || "(blank)", marksEarned: earned,
                marksTotal: q.marks, status: status, expectedAnswer: q.msText, 
                aiFeedback: aiFeedback,
                isGraphical: q.isGraphical
            });
        }
        
        let percent = (totalEarned / totalPossible) * 100;
        let grade = percent >=85 ? "9" : percent>=78 ? "8" : percent>=70 ? "7" : percent>=62 ? "6" : percent>=54 ? "5" : percent>=45 ? "4" : percent>=35 ? "3" : percent>=25 ? "2" : "1";
        let weakTopics = [];
        let topicAgg = {};
        questionFeedback.forEach(fb => { if(!topicAgg[fb.topic]) topicAgg[fb.topic]={earned:0,total:0}; topicAgg[fb.topic].earned+=fb.marksEarned; topicAgg[fb.topic].total+=fb.marksTotal; });
        for(let t in topicAgg) if((topicAgg[t].earned/topicAgg[t].total)*100 < 55) weakTopics.push(t);
        
        const reviewDiv = document.getElementById("reviewPanel");
        reviewDiv.classList.remove("hidden");
        let html = `<h2>📊 Exam Results</h2><div class="score-badge">${totalEarned} / ${totalPossible} (${percent.toFixed(1)}%)</div>
                    <div class="grade-box"><strong>Edexcel Grade: ${grade}</strong></div>
                    <div class="grade-box" style="background:#e9f0f5;"><strong>📊 Graph Questions:</strong> ${graphQuestionCount} question(s) were self-assessed using mark scheme</div>`;
        if(weakTopics.length) html += `<div class="weakness-box"><h3>⚠️ Weak areas (&lt;55%)</h3><ul>${weakTopics.map(w=>`<li>${w}</li>`).join('')}</ul></div>`;
        else html += `<div class="weakness-box" style="background:#e0f2e9;"><h3>✅ Strong performance overall!</h3></div>`;
        
        html += `<details open><summary>📋 Detailed Feedback</summary><table class="feedback-table"><thead>`;
        html += `<tr><th>#</th><th>Topic</th><th>Question</th><th>Your Answer</th><th>Score</th><th>Feedback</th><th>Mark Scheme</th></tr>`;
        html += `</thead><tbody>`;
        
        for(let fb of questionFeedback) {
            let cls = fb.marksEarned === fb.marksTotal ? "correct-highlight" : (fb.marksEarned===0 ? "incorrect-highlight" : "");
            html += `<tr class="${cls}">`;
            html += `<td>${fb.number}${fb.isGraphical ? ' 📊' : ''}</td>`;
            html += `<td>${fb.topic}</td>`;
            html += `<td>${fb.question}</td>`;
            html += `<td style="max-width:250px;">${fb.studentAnswer}</td>`;
            html += `<td style="text-align:center;">${fb.marksEarned}/${fb.marksTotal}<br>${fb.status}</td>`;
            html += `<td style="max-width:300px;">${fb.aiFeedback || "No feedback available"}</td>`;    
            html += `<td style="max-width:250px;">${fb.expectedAnswer || "N/A"}</td>`;
            html += `</tr>`;
        }
        
        html += `</tbody></table></details>`;
        html += `<p style="margin-top: 20px; padding: 12px; background: #f0f6fa; border-radius: 16px;">✅ <strong>How marking worked:</strong> Questions automatically detected as "graph/drawing/plot" questions (${graphQuestionCount} total) required self-assessment using the mark scheme. All other questions were marked automatically.</p>`;
        
        reviewDiv.innerHTML = html;
        document.body.removeChild(loadingDiv);
        document.querySelectorAll("input, textarea, button, select").forEach(el => { if(el.id !== "submitBtn") el.disabled = true; });
        document.getElementById("submitBtn").disabled = true;
        showToast("Marking complete!", false);
        localStorage.removeItem("igcse_bio_exam_autosave");
        
        try {
            const emailResultData = {
                score: totalEarned,
                totalMarks: totalPossible,
                percent: percent,
                grade: grade,
                weakTopics: weakTopics,
                details: questionFeedback.map(fb => ({
                    qNum: fb.number,
                    earned: fb.marksEarned,
                    max: fb.marksTotal
                }))
            };
            await sendResultsEmail(emailResultData, "Exam Candidate");
        } catch(emailError) {
            console.error("Failed to send email:", emailError);
        }
    }
    
    // Expose functions globally
    window.saveAnswer = saveAnswer;
    window.setManualMark = setManualMark;
    window.toggleMarkScheme = toggleMarkScheme;
    window.goToQuestion = goToQuestion;
    
    window.onload = () => {
        loadAutoSave();
        buildQuestionsHTML();
        renderNavigation();
        startTimer();
        autoSaveTimer = setInterval(() => { if(!examSubmitted) autoSaveToLocal(); }, 30000);
        document.getElementById("nextBtn").onclick = () => { if(currentQIndex+1 < questionsData.length && !examSubmitted) goToQuestion(currentQIndex+1); };
        document.getElementById("prevBtn").onclick = () => { if(currentQIndex-1 >=0 && !examSubmitted) goToQuestion(currentQIndex-1); };
        document.getElementById("submitBtn").onclick = () => { if(confirm("Submit exam? Graph questions require self-assessment; other questions will be AI-marked.")) submitAndMarkExam(); };
    };
</script>
</body>
</html>
