<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Pearson Edexcel International GCSE | Interactive with Auto Graph Detection</title>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>   
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 20px;
            color: #1e2a3e;
        }
        .exam-container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 28px;
            box-shadow: 0 12px 30px rgba(0,0,0,0.1);
            overflow: hidden;
            padding: 20px 30px 40px;
        }
        .header {
            border-bottom: 3px solid #2c7da0;
            padding-bottom: 15px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
        }
        .title h1 { margin: 0; font-size: 1.7rem; color: #0b3b4f; }
        .title p { margin: 5px 0 0; color: #2c7da0; font-weight: 500; }
        .timer-area { background: #1e2a3e; padding: 8px 18px; border-radius: 60px; color: white; text-align: center; font-weight: bold; }
        .timer { font-size: 2rem; font-family: monospace; letter-spacing: 2px; }
        .info-bar {
            background: #e9f0f5;
            padding: 10px 20px;
            border-radius: 28px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
        }
        .question-nav {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 25px;
            border-bottom: 1px solid #cbd5e1;
            padding-bottom: 15px;
            max-height: 150px;
            overflow-y: auto;
        }
        .nav-btn {
            background: #eef2f6;
            border: none;
            width: 42px;
            height: 42px;
            border-radius: 42px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.1s;
            font-size: 0.9rem;
        }
        .nav-btn.active { background: #2c7da0; color: white; }
        .nav-btn.answered { background: #61a5c2; color: white; }
        .question-card {
            display: none;
            background: #ffffff;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 30px;
            border: 1px solid #e2e8f0;
        }
        .question-card.active-question { display: block; }
        .q-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 15px;
            background: #f0f6fa;
            padding: 6px 12px;
            border-radius: 30px;
            display: inline-block;
        }
        .marks { font-size: 0.8rem; background: #cbd5e1; border-radius: 20px; padding: 2px 10px; margin-left: 12px; }
        .subquestion { margin: 20px 0 20px 12px; border-left: 3px solid #cbd5e1; padding-left: 18px; }
        .placeholder-img {
            background: #eef2f9;
            border: 1px dashed #8ba0bc;
            padding: 20px;
            text-align: center;
            border-radius: 16px;
            margin: 15px 0;
            font-style: italic;
            color: #2c3e66;
        }
        .mcq-option { margin: 10px 0; }
        input[type="text"], input[type="number"], textarea {
            padding: 10px 14px;
            border-radius: 14px;
            border: 1px solid #b9c7d9;
            width: 100%;
            max-width: 550px;
            font-family: inherit;
        }
        textarea { max-width: 100%; }
        .action-buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 30px;
            gap: 12px;
            flex-wrap: wrap;
        }
        button { background: #2c7da0; border: none; padding: 10px 26px; border-radius: 40px; color: white; font-weight: bold; cursor: pointer; font-size: 0.9rem; }
        button.secondary { background: #6c757d; }
        button.warning { background: #b23c1c; }
        button:disabled { opacity: 0.6; cursor: not-allowed; }
        .review-section { background: #fef9e3; padding: 20px; border-radius: 20px; margin-top: 30px; }
        .hidden { display: none; }
        .score-badge { font-size: 2rem; font-weight: bold; color: #1e2a3e; }
        .grade-box { background: #d9e6f2; padding: 12px; border-radius: 24px; margin: 15px 0; }
        .weakness-box { background: #ffe6e6; padding: 16px; border-radius: 20px; margin-top: 20px; border-left: 8px solid #c7362b; }
        .feedback-table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        .feedback-table th, .feedback-table td { border: 1px solid #ddd; padding: 10px; vertical-align: top; text-align: left; }
        .feedback-table th { background: #2c7da0; color: white; }
        .feedback-table tr:nth-child(even) { background: #f9f9f9; }
        .correct-highlight { background: #d4edda; }
        .incorrect-highlight { background: #f8d7da; }
        details summary { cursor: pointer; font-weight: 600; margin: 15px 0; }
        footer { text-align: center; font-size: 0.8rem; margin-top: 30px; color: #6c757d; }
        .status-toast {
            position: fixed; bottom: 20px; right: 20px;
            background: #2c7da0; color: white; padding: 8px 16px;
            border-radius: 30px; font-size: 0.8rem; opacity: 0;
            transition: opacity 0.3s; pointer-events: none; z-index: 1000;
        }
        .loading-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            backdrop-filter: blur(3px);
        }
        .loading-spinner {
            background: white;
            padding: 30px 40px;
            border-radius: 30px;
            text-align: center;
            font-weight: bold;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }
        .spinner {
            border: 4px solid #e9f0f5;
            border-top: 4px solid #2c7da0;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @media (max-width: 700px) { .exam-container { padding: 15px; } .timer { font-size: 1.4rem; } .feedback-table { font-size: 0.8rem; } }
        .ai-badge { background: #4a6fa5; color: white; font-size: 0.7rem; border-radius: 20px; padding: 2px 10px; margin-left: 10px; vertical-align: middle; }
        .ms-badge { background: #f4a261; color: white; font-size: 0.7rem; border-radius: 20px; padding: 2px 10px; margin-left: 10px; vertical-align: middle; }
        .ms-panel { background: #f8f9fc; border-left: 5px solid #f4a261; padding: 12px 16px; margin-top: 15px; border-radius: 16px; font-size: 0.9rem; display: none; }
        .ms-panel.visible { display: block; }
        .marks-earned-row {
            margin-top: 12px;
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        .marks-earned-row select {
            padding: 6px 12px;
            border-radius: 30px;
            background: white;
            border: 1px solid #b9c7d9;
            font-weight: bold;
        }
        button.small {
            background: #e76f51;
            padding: 5px 12px;
            font-size: 0.7rem;
            border: none;
            border-radius: 30px;
            color: white;
            cursor: pointer;
        }
        .graph-badge {
            background: #f4a261;
            color: white;
            font-size: 0.7rem;
            border-radius: 20px;
            padding: 2px 10px;
            margin-left: 10px;
            vertical-align: middle;
        }
    </style>
</head>
<body>
<div class="exam-container" id="examApp">
    <div class="header">
        <div class="title">
            <h1>Edexcel IGCSE Biology (4BI1)</h1>
            <p>Biology Paper 1B | Jan 2020</p>
        </div>
        <div class="timer-area">
            <div>Time Remaining</div>
            <div class="timer" id="timerDisplay">02:00:00</div>
        </div>
    </div>
    <div class="info-bar">
        <span>⏱️ 2 hours | 📝 Total marks: 110</span>
        <span id="answeredCounter">📋 Questions answered: 0 / 55</span>
        <span id="graphCounter">📊 Graph/Practical questions: 0</span>
    </div>
    <div id="navContainer" class="question-nav"></div>
    <div id="questionsContainer"></div>
    <div class="action-buttons">
        <button id="prevBtn" class="secondary">◀ Previous</button>
        <button id="nextBtn">Next ▶</button>
        <button id="submitBtn" class="warning">Submit Exam</button>
    </div>
    <div id="reviewPanel" class="review-section hidden"></div>
    <div id="statusToast" class="status-toast"></div>
</div>

<script>
    
    const EXAM_TITLE = "Edexcel IGCSE Biology (4BI1) - Jan 2020 Paper 1B";

    // ========== DEEPSEEK CONFIGURATION ==========
    const DEEPSEEK_API_KEY="DEEPSEEK_API_KEY_PLACEHOLDER";  // <-- PASTE YOUR DEEPSEEK API KEY HERE
    const DEEPSEEK_MODEL = "deepseek-chat";
    const EMAILJS_PUBLIC_KEY = "PmVcThAzwAjgqOwSD";     // Replace with your EmailJS public key
    const EMAILJS_SERVICE_ID = "service_301bogs";   // Replace with your service ID
    const EMAILJS_TEMPLATE_ID = "template_mld7q9t"; // Replace with your template ID
    const RECIPIENT_EMAIL = "aisha.daray@gmail.com";
    
    if(EMAILJS_PUBLIC_KEY && EMAILJS_PUBLIC_KEY !== "YOUR_PUBLIC_KEY") {
        try {
            emailjs.init(EMAILJS_PUBLIC_KEY);
        } catch(e) {
            console.log("EmailJS init error:", e);
        }
    }
    
    // ========== AUTO DETECTION FUNCTION FOR GRAPH QUESTIONS ==========
    // This function automatically detects if a question requires graph/drawing/plotting
 // MODIFIED: Only detects when type is 'graph' OR 'practical'
    function isGraphOrPracticalQuestion(question) {
        // Only return true if type is exactly 'graph' OR 'practical'
        return question.type === 'graph' || question.type === 'practical';
    }
    
    // ========== IndexedDB Setup ==========
    const DB_NAME = "IGCSE_Biology_Exam_DB";
    const DB_VERSION = 2;
    const PROGRESS_STORE = "exam_progress";
    const RESULTS_STORE = "exam_results";
    let db = null;
    
    function initDatabase() {
        return new Promise((resolve, reject) => {
            const request = indexedDB.open(DB_NAME, DB_VERSION);
            request.onerror = () => reject(request.error);
            request.onsuccess = () => {
                db = request.result;
                resolve(db);
            };
            request.onupgradeneeded = (event) => {
                const dbEvent = event.target.result;
                if (!dbEvent.objectStoreNames.contains(PROGRESS_STORE)) {
                    dbEvent.createObjectStore(PROGRESS_STORE, { keyPath: "id" });
                }
                if (!dbEvent.objectStoreNames.contains(RESULTS_STORE)) {
                    dbEvent.createObjectStore(RESULTS_STORE, { keyPath: "id", autoIncrement: true });
                }
            };
        });
    }
    
    async function saveProgressToDB(answers, manualMarks, timeLeft) {
        if (!db) await initDatabase();
        return new Promise((resolve, reject) => {
            const transaction = db.transaction([PROGRESS_STORE], "readwrite");
            const store = transaction.objectStore(PROGRESS_STORE);
            const record = {
                id: "current_progress",
                answers: answers,
                manualMarks: manualMarks,
                timeRemaining: timeLeft,
                timestamp: new Date().toISOString()
            };
            const request = store.put(record);
            request.onsuccess = () => resolve();
            request.onerror = () => reject(request.error);
        });
    }
    
    async function loadProgressFromDB() {
        if (!db) await initDatabase();
        return new Promise((resolve, reject) => {
            const transaction = db.transaction([PROGRESS_STORE], "readonly");
            const store = transaction.objectStore(PROGRESS_STORE);
            const request = store.get("current_progress");
            request.onsuccess = () => resolve(request.result);
            request.onerror = () => reject(request.error);
        });
    }
    
    async function saveResultToDB(resultData) {
        if (!db) await initDatabase();
        return new Promise((resolve, reject) => {
            const transaction = db.transaction([RESULTS_STORE], "readwrite");
            const store = transaction.objectStore(RESULTS_STORE);
            const record = {
                timestamp: new Date().toISOString(),
                ...resultData
            };
            const request = store.add(record);
            request.onsuccess = () => resolve(request.result);
            request.onerror = () => reject(request.error);
        });
    }
    
    async function clearProgressFromDB() {
        if (!db) await initDatabase();
        return new Promise((resolve, reject) => {
            const transaction = db.transaction([PROGRESS_STORE], "readwrite");
            const store = transaction.objectStore(PROGRESS_STORE);
            const request = store.delete("current_progress");
            request.onsuccess = () => resolve();
            request.onerror = () => reject(request.error);
        });
    }
    
    function showToast(message, isError = false) {
        const toast = document.getElementById("statusToast");
        if (!toast) return;
        toast.textContent = message;
        toast.style.background = isError ? "#b23c1c" : "#2c7da0";
        toast.style.opacity = "1";
        setTimeout(() => { toast.style.opacity = "0"; }, 3000);
    }
    
    async function sendResultsEmail(resultData, studentName = "Student") {
        if (EMAILJS_PUBLIC_KEY === "YOUR_PUBLIC_KEY") {
            console.log("EmailJS not configured. Results:", resultData);
            showToast("Email not sent - configure EmailJS keys", false);
            return false;
        }
        try {
            const emailParams = {
                EXAM_TITLE: EXAM_TITLE,
                to_email: RECIPIENT_EMAIL,
                student_name: studentName,
                score: resultData.score,
                total_marks: resultData.totalMarks,
                percentage: resultData.percent.toFixed(1),
                grade: resultData.grade,
                weak_topics: resultData.weakTopics.join(", ") || "None",
                exam_date: new Date().toLocaleString(),
                details_summary: resultData.details.map(d => `Q${d.qNum}: ${d.earned}/${d.max}`).join("; ")
            };
            await emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, emailParams);
            showToast("✅ Results emailed successfully!", false);
            return true;
        } catch(e) {
            console.error("Email error:", e);
            showToast("⚠️ Email failed - check EmailJS configuration", true);
            return false;
        }
    }
    
    // ========== Question Bank (without isGraphical flag - will be auto-detected) ==========
    const questionsDataRaw = [
        { id:"q1ai", type:"mcq", text:"1(a)(i) How many producers are shown in this food web?", options:["A one","B three","C four","D nine"], correct:"B three", marks:1, topic:"Ecology/Food webs", msText:"B (three)" },
        { id:"q1aii", type:"mcq", text:"1(a)(ii) How many secondary consumers are shown in this food web?", options:["A one","B three","C four","D seven"], correct:"C four", marks:1, topic:"Ecology/Food webs", msText:"C (four)" },
        { id:"q1bi", type:"written", text:"1(b)(i) Name the sense that uses receptor cells in the retina.", correctKeywords:["sight","vision","seeing","visual","optic"], marks:1, topic:"Nervous system", msText:"sight / vision / seeing (1)" },
        { id:"q1bii", type:"calc", text:"1(b)(ii) A coyote runs 530 metres in 30.0 seconds. Calculate speed in m/s.", correctValue:17.67, tolerance:0.05, marks:2, topic:"Maths/Speed", msText:"530 ÷ 30.0 = 17.7 m/s (2)" },
        { id:"q1c", type:"written", text:"1(c) Explain why lactic acid builds up in the coyote's muscles when it runs.", correctKeywords:["anaerobic respiration","provide energy / ATP","without oxygen"], marks:2, requiredKeywords:2, topic:"Respiration/Exercise", msText:"anaerobic respiration (1); provide energy / ATP (1); without oxygen (1)" },
        { id:"q2a", type:"written", text:"2(a) State three differences between eukaryotic and prokaryotic organisms.", correctKeywords:["have nucleus","have organelles / mitochondria / chloroplasts","have chromosomes / more than one chromosome","lack plasmids"], marks:3, requiredKeywords:3, topic:"Cell biology", msText:"have nucleus (1); have organelles (1); have chromosomes (1); lack plasmids (1)" },
        { id:"q2b", type:"pair", text:"2(b) Give an example of a disease caused by a protist (name protist + disease).", correctPairs:[["plasmodium","malaria"],["amoeba","dysentery"],["trypanosoma","sleeping sickness"]], marks:2, topic:"Disease", msText:"plasmodium → malaria (2); or amoeba → dysentery (2)" },
        { id:"q3a", type:"written", text:"3(a) Describe a method to show that the nut contains fat.", correctKeywords:["crush/grind nut","ethanol / Sudan III","add water","white / emulsion / red (layer)"], marks:3, requiredKeywords:3, topic:"Food tests", msText:"crush/grind nut (1); ethanol / Sudan III (1); add water (1); white/emulsion/red layer (1)" },
        { id:"q3bi", type:"written", text:"3(b)(i) Explain the role of fibre in the squirrel's diet.", correctKeywords:["peristalsis","move food along intestine","prevent constipation","undigested material / cellulose"], marks:2, requiredKeywords:2, topic:"Diet", msText:"peristalsis (1); move food along intestine (1); prevent constipation (1); undigested material (1)" },
        { id:"q3bii", type:"written", text:"3(b)(ii) Explain which nut is better at helping the squirrel make red blood cells.", correctKeywords:["nut A has more iron","(more) haemoglobin"], marks:2, requiredKeywords:2, topic:"Nutrition/Blood", msText:"nut A has more iron (1); (more) haemoglobin (1)" },
        { id:"q3biii", type:"calc", text:"3(b)(iii) Nut A has mass 28.0g, carbohydrate 167mg per g. Calculate total carbohydrate in grams.", correctValue:4.676, tolerance:0.02, marks:2, topic:"Maths", msText:"0.167 × 28.0 = 4.68g (2)" },
        { id:"q3c", type:"written", text:"3(c) Discuss possible reasons for the decrease in squirrels from 2010 to 2018 (use graphs).", correctKeywords:["more foxes / increased predation","foxes eat nuts (less food)","fewer trees","other species eat nuts / competition","other predators entered","disease / infection","migration","time of year counted","cold weather / lower temperature","human impact / hunting"], marks:5, requiredKeywords:5, topic:"Ecology", msText:"more foxes / increased predation (1); foxes eat nuts (less food) (1); fewer trees (1); other species eat nuts (1); disease / infection (1); migration (1); cold weather (1); human impact / hunting (1)" },
        { id:"q4ai", type:"written", text:"4(a)(i) State what is meant by the term catalyst.", correctKeywords:["substance that speeds up chemical reactions","lowers activation energy"], marks:1, topic:"Enzymes", msText:"(substance that) speeds up (chemical) reactions (1)" },
        { id:"q4aii", type:"written", text:"4(a)(ii) State what is meant by the term metabolic.", correctKeywords:["chemical reactions / processes in cells / cytoplasm / body"], marks:1, topic:"Metabolism", msText:"(chemical) reactions / processes in cells (1)" },
        { id:"q4bi", type:"graph", text:"4(b)(i) Plot a line graph of enzyme concentration vs mean rate of oxygen production.", correctKeywords:["scale linear half grid","lines drawn between points","axis correct way around","points correctly plotted","axes labelled"], marks:5, topic:"Graph skills", msText:"scale linear (1); lines straight through points (1); axis correct way around (1); points correctly plotted (1); axes labelled (1)" },
        { id:"q4bii", type:"written", text:"4(b)(ii) Explain the effect of increasing enzyme concentration on rate of oxygen production.", correctKeywords:["as enzyme concentration increases rate increases","up to 8 discs then levels off","more enzyme available to react with substrate / more collisions","until all substrate used / substrate limiting"], marks:3, requiredKeywords:3, topic:"Enzymes", msText:"rate increases (1); up to 8 discs then levels off (1); more enzyme available (1); until substrate limiting (1)" },
        { id:"q4biii", type:"written", text:"4(b)(iii) Name a suitable apparatus to measure volume of oxygen.", correctKeywords:["gas syringe","inverted measuring cylinder"], marks:1, topic:"Practical", msText:"(gas) syringe / (inverted) measuring cylinder (1)" },
        { id:"q4biv", type:"written", text:"4(b)(iv) Explain why volume and concentration of hydrogen peroxide must be kept constant.", correctKeywords:["only one variable changed / fair test","these also affect the rate"], marks:2, requiredKeywords:2, topic:"Variables", msText:"only one variable changed / fair test (1); these also affect the rate (1)" },
        { id:"q4bv", type:"written", text:"4(b)(v) Name another variable to keep constant.", correctKeywords:["temperature","pH","type of potato"], marks:1, topic:"Variables", msText:"temperature / pH / type of potato (1)" },
        { id:"q5ai", type:"written", text:"5(a)(i) Explain how increasing temperature can increase crop yield.", correctKeywords:["increases rate of photosynthesis","increased kinetic energy / molecules move faster","optimum temperature for enzymes","more glucose produced"], marks:2, requiredKeywords:2, topic:"Photosynthesis", msText:"increases rate of photosynthesis (1); increased kinetic energy (1); optimum temperature for enzymes (1); more glucose produced (1)" },

        { id:"q5bi", type:"written", text:"5(b)(i) Explain one mineral that should be added to fertilisers.", correctKeywords:["nitrate for amino acids/proteins","magnesium for chlorophyll"], marks:2, requiredKeywords:2, topic:"Plant nutrition", msText:"nitrate for amino acids / proteins (1); magnesium for chlorophyll (1)" },
        { id:"q5bii", type:"written", text:"5(b)(ii) Discuss why some farmers limit chemical fertilisers.", correctKeywords:["increased soil concentration reduces water potential","prevents water uptake by osmosis","causes wilting","leaching into rivers/lakes","causes eutrophication","algal bloom / plant growth in water","loss of aquatic life","prefer natural fertiliser / organic","excess fertiliser not used"], marks:5, requiredKeywords:5, topic:"Pollution", msText:"reduces water potential (1); prevents water uptake / causes water loss (1); causes wilting (1); leaching (1); causes eutrophication (1); algal bloom (1); loss of aquatic life (1); use natural fertiliser (1); excess fertiliser not used (1)" },
        { id:"q6a", type:"written", text:"6(a) Explain the role of bile in digestion.", correctKeywords:["neutralise acid (from stomach)","optimum pH for enzymes","emulsify fat/lipid","small droplets","increase surface area"], marks:4, requiredKeywords:4, topic:"Digestion", msText:"neutralise acid (1); optimum pH for enzymes (1); emulsify fat (1); small droplets (1); increase surface area (1)" },
        { id:"q6b", type:"mcq", text:"6(b) How many blood vessels transport deoxygenated blood from the liver?", options:["A 0","B 1","C 2","D 3"], correct:"B 1", marks:1, topic:"Circulation", msText:"B (1)" },
        { id:"q6ci", type:"written", text:"6(c)(i) Explain why glucose concentration in hepatic portal vein is higher than in hepatic vein after a meal.", correctKeywords:["glucose absorbed / taken in","insulin","(glucose to) glycogen","lowers blood glucose in hepatic vein"], marks:3, requiredKeywords:3, topic:"Homeostasis", msText:"glucose absorbed (1); insulin (1); glucose to glycogen (1); lowers blood glucose (1)" },
        { id:"q6cii", type:"written", text:"6(c)(ii) Explain the difference after 5 hours.", correctKeywords:["less food in gut / less absorption of glucose","no insulin","glycogen to glucose","glucose released from liver"], marks:2, requiredKeywords:2, topic:"Homeostasis", msText:"less absorption (1); no insulin (1); glycogen to glucose (1); glucose released from liver (1)" },
        { id:"q7a", type:"mcq", text:"7(a) Which describes the genotypes of the parent fruit flies (long wing × long wing produce some short wing offspring)?", options:["A both heterozygous","B both homozygous","C both have long wings","D one heterozygous one homozygous"], correct:"A both heterozygous", marks:1, topic:"Genetics", msText:"A (both heterozygous)" },

        { id:"q8aiii", type:"mcq", text:"8(a)(iii) Which part transports the products of photosynthesis?", options:["A Q","B R","C S","D T"], correct:"C S", marks:1, topic:"Phloem", msText:"C (S)" },

        { id:"q9ciii", type:"written", text:"9(c)(iii) Give two variables to control.", correctKeywords:["number/concentration of phagocytes","number/concentration of bacteria","species/type of bacteria","aseptic environment"], marks:2, requiredKeywords:2, topic:"Variables", msText:"number of phagocytes (1); number of bacteria (1); species of bacteria (1); aseptic environment (1)" },
        { id:"q9civ", type:"written", text:"9(c)(iv) Comment on the conclusion that vitamin C will protect people from pathogens.", correctKeywords:["vitamin C increases ingestion","only done once / not repeated / not reliable","done in vitro / not in human body","need to test with other bacteria","not all pathogens are bacteria","not done at body temperature"], marks:4, requiredKeywords:4, topic:"Evaluation", msText:"vitamin C increases ingestion (1); only done once (1); in vitro (1); need to test other bacteria (1); not all pathogens are bacteria (1); not at body temp (1)" },
        { id:"q10ai", type:"written", text:"10(a)(i) Name parts A, B, C (stigma, style, ovary).", correctKeywords:["A stigma","B style","C ovary"], marks:3, requiredKeywords:3, topic:"Plant reproduction", msText:"A stigma (1); B style (1); C ovary (1)" },
        { id:"q10aii", type:"written", text:"10(a)(ii) Draw the path of the pollen tube after germination.", correctKeywords:["tube down style","tube entering micropyle"], marks:2, topic:"Fertilisation", msText:"tube down style (1); tube entering micropyle (1)" },
        { id:"q10aiii", type:"written", text:"10(a)(iii) Describe what happens to structures in part C (ovary) after fertilisation.", correctKeywords:["ovule becomes seed","ovary becomes fruit"], marks:2, requiredKeywords:2, topic:"Seed formation", msText:"ovule becomes seed (1); ovary becomes fruit (1)" },
        { id:"q10bi", type:"calc", text:"10(b)(i) Calculate percentage increase in germination: wet&cold (476) vs wet&warm (432).", correctValue:10.2, tolerance:0.2, marks:2, topic:"Maths", msText:"(476-432)÷432×100 = 10.2% (2)" },
        { id:"q10bii", type:"written", text:"10(b)(ii) Suggest why fewer seeds germinate after wet & warm storage.", correctKeywords:["more fungi/bacteria/microbes","seeds diseased / contents digested","enzymes activated","seeds start to germinate in storage"], marks:2, requiredKeywords:2, topic:"Germination", msText:"more fungi/bacteria (1); seeds diseased (1); enzymes activated (1); seeds start to germinate (1)" },
        { id:"q10biii", type:"written", text:"10(b)(iii) Give one observation that shows a seed has germinated.", correctKeywords:["seed split","radicle / root seen","plumule / shoot seen","sprouts"], marks:1, topic:"Germination", msText:"seed split / radicle seen / plumule seen / sprouts (1)" }
    ];

    
    // Auto-detect graph questions and add isGraphical flag
// Auto-detect based ONLY on type
    let questionsData = questionsDataRaw.map(q => ({
        ...q,
        isGraphical: isGraphOrPracticalQuestion(q)  // Now only checks type
    }));
    
    // Count graph questions for display
    const graphQuestionCount = questionsData.filter(q => q.isGraphical).length;
    
    let userAnswers = new Array(questionsData.length).fill("");
    let userManualMarks = new Array(questionsData.length).fill(null);
    let currentQIndex = 0;
    let examSubmitted = false;
    let timerInterval;
    let timeSeconds = 120 * 60;
    let autoSaveTimer = null;
    
    function autoSaveToLocal() {
        if(examSubmitted) return;
        const saveData = {
            answers: userAnswers,
            manualMarks: userManualMarks,
            timeRemaining: timeSeconds,
            timestamp: Date.now()
        };
        localStorage.setItem("igcse_bio_exam_autosave", JSON.stringify(saveData));
    }

    function loadAutoSave() {
        const saved = localStorage.getItem("igcse_bio_exam_autosave");
        if(saved) {
            try {
                const data = JSON.parse(saved);
                if(data.answers && data.answers.length === userAnswers.length) {
                    userAnswers = data.answers;
                    if(data.manualMarks) userManualMarks = data.manualMarks;
                    if(data.timeRemaining && data.timeRemaining > 0 && data.timeRemaining < 7200) {
                        timeSeconds = data.timeRemaining;
                        updateTimerDisplay();
                    }
                    return true;
                }
            } catch(e) { console.log("Load error:", e); }
        }
        return false;
    }
    
    function formatTime(sec) { let h=Math.floor(sec/3600), m=Math.floor((sec%3600)/60), s=sec%60; return `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`; }
    function updateTimerDisplay() { document.getElementById("timerDisplay").innerText = formatTime(timeSeconds); if(timeSeconds<=0 && !examSubmitted) autoSubmitExam(); }
    function autoSubmitExam() { if(!examSubmitted) submitAndMarkExam(); }
    function startTimer() { 
        timerInterval = setInterval(()=>{ 
            if(!examSubmitted && timeSeconds > 0){ 
                timeSeconds--; 
                updateTimerDisplay(); 
                if(timeSeconds % 30 === 0) autoSaveToLocal();
            } else if(timeSeconds <= 0 && !examSubmitted) {
                autoSubmitExam();
            }
        }, 1000);
    }
    
    function renderNavigation() {
        const navDiv = document.getElementById("navContainer");
        navDiv.innerHTML = "";
        questionsData.forEach((_, idx) => {
            const btn = document.createElement("button");
            btn.innerText = idx+1;
            btn.classList.add("nav-btn");
            if(userAnswers[idx] && userAnswers[idx].toString().trim() !== "") btn.classList.add("answered");
            if(idx === currentQIndex) btn.classList.add("active");
            btn.onclick = () => { if(!examSubmitted) goToQuestion(idx); };
            navDiv.appendChild(btn);
        });
        let answered = userAnswers.filter(a => a && a.toString().trim() !== "").length;
        document.getElementById("answeredCounter").innerHTML = `📋 Questions answered: ${answered} / ${questionsData.length}`;
        document.getElementById("graphCounter").innerHTML = `📊 Graph/Practical questions: ${graphQuestionCount} (self-assess)`;
    }
    
    function goToQuestion(idx) { if(examSubmitted) return; document.querySelectorAll(".question-card").forEach(card => card.classList.remove("active-question")); currentQIndex = idx; const target = document.getElementById(`qcard-${idx}`); if(target) target.classList.add("active-question"); renderNavigation(); }
    function saveAnswer(idx, value) { if(examSubmitted) return; userAnswers[idx] = value; renderNavigation(); autoSaveToLocal(); }
    function setManualMark(idx, markValue) { if(examSubmitted) return; let num = parseInt(markValue) || 0; let maxMarks = questionsData[idx].marks; num = Math.min(Math.max(num,0), maxMarks); userManualMarks[idx] = num; autoSaveToLocal(); }
    function toggleMarkScheme(idx) { 
        if(!questionsData[idx].isGraphical) return;
        let panel = document.getElementById(`ms-panel-${idx}`); 
        if(panel) panel.classList.toggle("visible"); 
    }
    
    function buildQuestionsHTML() {
        const container = document.getElementById("questionsContainer");
        container.innerHTML = "";
        questionsData.forEach((q, idx) => {
            const card = document.createElement("div");
            card.className = "question-card";
            if(idx === 0) card.classList.add("active-question");
            card.id = `qcard-${idx}`;
            let inner = `<div class="q-title">Q${idx+1} (${q.topic}) <span class="marks">${q.marks} marks</span>`;
            
            if(q.isGraphical) {
                inner += `<span class="graph-badge">📊 Graph/Diagram Question - Self-Assess</span>`;
            }
            inner += `</div><div>${q.text}</div>`;
            
            // Answer input based on type
            if(q.type === "mcq") {
                inner += `<div class="subquestion">`;
                (q.options || []).forEach(opt => {
                    let checked = (userAnswers[idx] === opt) ? "checked" : "";
                    inner += `<label class="mcq-option"><input type="radio" name="q${idx}" value="${opt}" ${checked} onchange="saveAnswer(${idx}, this.value)"> ${opt}</label><br>`;
                });
                inner += `</div>`;
            } else if(q.type === "calc") {
                let val = userAnswers[idx] || "";
                inner += `<div class="subquestion"><input type="text" placeholder="Numeric answer..." value="${val.replace(/"/g, '&quot;')}" onchange="saveAnswer(${idx}, this.value)"></div>`;
            } else {
                let val = userAnswers[idx] || "";
                inner += `<div class="subquestion"><textarea rows="3" placeholder="Write your answer..." onchange="saveAnswer(${idx}, this.value)">${val}</textarea></div>`;
            }
            
            // AUTO-DETECTED: For graph questions, show Mark Scheme button + self-assess marks
            if(q.isGraphical === true) {
                inner += `<div style="margin-top:12px;">
                            <button type="button" class="small" onclick="toggleMarkScheme(${idx})">📖 Show Mark Scheme (for self-assessment)</button>
                            <div id="ms-panel-${idx}" class="ms-panel"><strong>📌 Mark Scheme:</strong><br>${q.msText || 'No mark scheme provided'}</div>
                            <div class="marks-earned-row"><span>✍️ Self-assess marks earned (0-${q.marks}): </span>
                            <select onchange="setManualMark(${idx}, this.value)"><option value="">-- select --</option>`;
                for(let m=0; m<=q.marks; m++) {
                    let sel = (userManualMarks[idx] === m) ? "selected" : "";
                    inner += `<option value="${m}" ${sel}>${m} / ${q.marks}</option>`;
                }
                inner += `</select></div></div>`;
            }
            
            // Show placeholder for graph/drawing questions
            if(q.isGraphical || q.text.toLowerCase().includes('graph') || q.text.toLowerCase().includes('plot') || q.text.toLowerCase().includes('draw')) {
                inner += `<div class="placeholder-img">📊 [Graph/Diagram placeholder - please plot/draw on paper or upload your drawing]</div>`;
            }
            
            card.innerHTML = inner;
            container.appendChild(card);
        });
    }
    
    // Smart marking function (same as original)
    async function callDEEPSEEKForMark(question, studentAnswer, markScheme, maxMarks) {
        if(!DEEPSEEK_API_KEY || DEEPSEEK_API_KEY === "YOUR_DEEPSEEK_API_KEY") {
            if(!studentAnswer) return { score: 0, feedback: "No answer provided" };
            let keywords = question.correctKeywords || [];
            if(keywords.length === 0) return { score: 0, feedback: "No keywords defined for marking" };
            let ansLower = studentAnswer.toLowerCase();
            let matched = keywords.filter(kw => ansLower.includes(kw.toLowerCase())).length;
            let required = question.requiredKeywords || keywords.length;
            let score = Math.min(matched, required, maxMarks);
            let feedback = `Matched ${matched}/${required} key terms. Expected: ${keywords.join(", ")}`;
            return { score: score, feedback: feedback };
        }
        
        const prompt = `You are an Edexcel IGCSE Biology examiner. Award marks strictly based on the mark scheme and provide constructive feedback.
    Question: "${question.text}"
    Mark Scheme: "${markScheme}"
    Maximum marks: ${maxMarks}
    Student Answer: "${studentAnswer || '[no answer]'}"
    Return ONLY a JSON object: {"score": number (0-${maxMarks}), "feedback": "brief constructive feedback explaining what was good/missing"}. Do not include any other text.`;
        
        try {
            const response = await fetch("https://api.DEEPSEEK.com/v1/chat/completions", {
                method: "POST",
                headers: { "Content-Type": "application/json", "Authorization": `Bearer ${DEEPSEEK_API_KEY}` },
                body: JSON.stringify({ model: DEEPSEEK_MODEL, messages: [{ role: "user", content: prompt }], temperature: 0.1 })
            });
            if(!response.ok) throw new Error(`API error ${response.status}`);
            const data = await response.json();
            const result = JSON.parse(data.choices[0].message.content);
            return {
                score: Math.min(Math.max(0, parseInt(result.score) || 0), maxMarks),
                feedback: result.feedback || "AI assessment complete."
            };
        } catch(e) { 
            console.error("DEEPSEEK error:", e); 
            return { score: 0, feedback: "Smart marking error - please review manually" };
        }
    }
    
    async function submitAndMarkExam() {
        if(examSubmitted) return;
        clearInterval(timerInterval);
        if(autoSaveTimer) clearInterval(autoSaveTimer);        
        examSubmitted = true;
        
        showToast("🤖 AI is marking non-graphical questions...", false);
        const loadingDiv = document.createElement("div");
        loadingDiv.className = "loading-overlay";
        loadingDiv.innerHTML = `<div class="loading-spinner"><div class="spinner"></div><p>Marking in progress...</div>`;
        document.body.appendChild(loadingDiv);
        
        let totalEarned = 0, totalPossible = 0;
        let questionFeedback = [];
        
        for(let i=0; i<questionsData.length; i++) {
            let q = questionsData[i];
            let answer = userAnswers[i] || "";
            let earned = 0;
            let aiFeedback = "";
            
            if(q.isGraphical === true) {
                earned = (userManualMarks[i] !== null && !isNaN(userManualMarks[i])) ? userManualMarks[i] : 0;
                earned = Math.min(Math.max(0, earned), q.marks);
                aiFeedback = "Self-assessed by student (graph/diagram question - compared with mark scheme)";
            } else if(q.type === "mcq") {
                earned = (answer && answer.trim().toLowerCase() === (q.correct || "").toLowerCase()) ? q.marks : 0;
                aiFeedback = earned === q.marks ? "Correct answer selected" : "Incorrect answer - correct option: " + q.correct;
            } else if(q.type === "calc") {
                let num = parseFloat(answer);
                if(!isNaN(num) && Math.abs(num - q.correctValue) <= (q.tolerance || 0.01)) {
                    earned = q.marks;
                    aiFeedback = `Correct calculation (expected: ${q.correctValue})`;
                } else {
                    earned = 0;
                    aiFeedback = `Incorrect calculation. Expected: ${q.correctValue}, Got: ${answer || "no answer"}`;
                }
            } else {
                const aiResult = await callDEEPSEEKForMark(q, answer, q.msText, q.marks);
                earned = aiResult.score;
                aiFeedback = aiResult.feedback;
            }
            
            totalEarned += earned;
            totalPossible += q.marks;
            let status = earned === q.marks ? "✓ Full marks" : (earned === 0 ? "✗ No marks" : "⚠ Partial marks");
            
            questionFeedback.push({
                number: i+1, topic: q.topic, question: q.text,
                studentAnswer: answer || "(blank)", marksEarned: earned,
                marksTotal: q.marks, status: status, expectedAnswer: q.msText, 
                aiFeedback: aiFeedback,
                isGraphical: q.isGraphical
            });
        }
        
        let percent = (totalEarned / totalPossible) * 100;
        let grade = percent >=85 ? "9" : percent>=78 ? "8" : percent>=70 ? "7" : percent>=62 ? "6" : percent>=54 ? "5" : percent>=45 ? "4" : percent>=35 ? "3" : percent>=25 ? "2" : "1";
        let weakTopics = [];
        let topicAgg = {};
        questionFeedback.forEach(fb => { if(!topicAgg[fb.topic]) topicAgg[fb.topic]={earned:0,total:0}; topicAgg[fb.topic].earned+=fb.marksEarned; topicAgg[fb.topic].total+=fb.marksTotal; });
        for(let t in topicAgg) if((topicAgg[t].earned/topicAgg[t].total)*100 < 55) weakTopics.push(t);
        
        const reviewDiv = document.getElementById("reviewPanel");
        reviewDiv.classList.remove("hidden");
        let html = `<h2>📊 Exam Results</h2><div class="score-badge">${totalEarned} / ${totalPossible} (${percent.toFixed(1)}%)</div>
                    <div class="grade-box"><strong>Edexcel Grade: ${grade}</strong></div>
                    <div class="grade-box" style="background:#e9f0f5;"><strong>📊 Graph Questions:</strong> ${graphQuestionCount} question(s) were self-assessed using mark scheme</div>`;
        if(weakTopics.length) html += `<div class="weakness-box"><h3>⚠️ Weak areas (&lt;55%)</h3><ul>${weakTopics.map(w=>`<li>${w}</li>`).join('')}</ul></div>`;
        else html += `<div class="weakness-box" style="background:#e0f2e9;"><h3>✅ Strong performance overall!</h3></div>`;
        
        html += `<details open><summary>📋 Detailed Feedback</summary><table class="feedback-table"><thead>`;
        html += `<tr><th>#</th><th>Topic</th><th>Question</th><th>Your Answer</th><th>Score</th><th>Feedback</th><th>Mark Scheme</th></tr>`;
        html += `</thead><tbody>`;
        
        for(let fb of questionFeedback) {
            let cls = fb.marksEarned === fb.marksTotal ? "correct-highlight" : (fb.marksEarned===0 ? "incorrect-highlight" : "");
            html += `<tr class="${cls}">`;
            html += `<td>${fb.number}${fb.isGraphical ? ' 📊' : ''}</td>`;
            html += `<td>${fb.topic}</td>`;
            html += `<td>${fb.question}</td>`;
            html += `<td style="max-width:250px;">${fb.studentAnswer}</td>`;
            html += `<td style="text-align:center;">${fb.marksEarned}/${fb.marksTotal}<br>${fb.status}</td>`;
            html += `<td style="max-width:300px;">${fb.aiFeedback || "No feedback available"}</td>`;    
            html += `<td style="max-width:250px;">${fb.expectedAnswer || "N/A"}</td>`;
            html += `</tr>`;
        }
        
        html += `</tbody></table></details>`;
        html += `<p style="margin-top: 20px; padding: 12px; background: #f0f6fa; border-radius: 16px;">✅ <strong>How marking worked:</strong> Questions automatically detected as "graph/drawing/plot" questions (${graphQuestionCount} total) required self-assessment using the mark scheme. All other questions were marked automatically.</p>`;
        
        reviewDiv.innerHTML = html;
        document.body.removeChild(loadingDiv);
        document.querySelectorAll("input, textarea, button, select").forEach(el => { if(el.id !== "submitBtn") el.disabled = true; });
        document.getElementById("submitBtn").disabled = true;
        showToast("Marking complete!", false);
        localStorage.removeItem("igcse_bio_exam_autosave");
        
        try {
            const emailResultData = {
                score: totalEarned,
                totalMarks: totalPossible,
                percent: percent,
                grade: grade,
                weakTopics: weakTopics,
                details: questionFeedback.map(fb => ({
                    qNum: fb.number,
                    earned: fb.marksEarned,
                    max: fb.marksTotal
                }))
            };
            await sendResultsEmail(emailResultData, "Exam Candidate");
        } catch(emailError) {
            console.error("Failed to send email:", emailError);
        }
    }
    
    // Expose functions globally
    window.saveAnswer = saveAnswer;
    window.setManualMark = setManualMark;
    window.toggleMarkScheme = toggleMarkScheme;
    window.goToQuestion = goToQuestion;
    
    window.onload = () => {
        loadAutoSave();
        buildQuestionsHTML();
        renderNavigation();
        startTimer();
        autoSaveTimer = setInterval(() => { if(!examSubmitted) autoSaveToLocal(); }, 30000);
        document.getElementById("nextBtn").onclick = () => { if(currentQIndex+1 < questionsData.length && !examSubmitted) goToQuestion(currentQIndex+1); };
        document.getElementById("prevBtn").onclick = () => { if(currentQIndex-1 >=0 && !examSubmitted) goToQuestion(currentQIndex-1); };
        document.getElementById("submitBtn").onclick = () => { if(confirm("Submit exam? Graph questions require self-assessment; other questions will be AI-marked.")) submitAndMarkExam(); };
    };
</script>
