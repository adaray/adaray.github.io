    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;

            padding: 20px;

        .exam-container {

        .nav-btn.answered { background: #61a5c2; color: white; }
        .question-card {
            display: none;
            background: #ffffff;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 30px;
            border: 1px solid #e2e8f0;
        }
        .question-card.active-question { display: block; }
        .q-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 15px;
            background: #f0f6fa;
            padding: 6px 12px;
            border-radius: 30px;
            display: inline-block;
        }
        .marks { font-size: 0.8rem; background: #cbd5e1; border-radius: 20px; padding: 2px 10px; margin-left: 12px; }
        .subquestion { margin: 20px 0 20px 12px; border-left: 3px solid #cbd5e1; padding-left: 18px; }
        .placeholder-img {
            background: #eef2f9;
            border: 1px dashed #8ba0bc;
            padding: 20px;
            text-align: center;
            border-radius: 16px;
            margin: 15px 0;
            font-style: italic;
            color: #2c3e66;
        }
        .mcq-option { margin: 10px 0; }
        input[type="text"], input[type="number"], textarea {
            padding: 10px 14px;
            border-radius: 14px;
            border: 1px solid #b9c7d9;
            width: 100%;
            max-width: 550px;
            font-family: inherit;
        }
        textarea { max-width: 100%; }
        .mark-scheme-panel {
            background: #f8f9fc;
            border-left: 5px solid #2c7da0;
            padding: 12px 16px;
            margin-top: 15px;
            border-radius: 16px;
            font-size: 0.9rem;
            display: none;
        }
        .mark-scheme-panel.visible { display: block; }
        .marks-earned-row {
            margin-top: 12px;

            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        .marks-earned-row select {

            border-radius: 30px;
            background: white;
            border: 1px solid #b9c7d9;
            font-weight: bold;
        }
        button.small {
            background: #4a6f8a;
            padding: 5px 12px;
            font-size: 0.7rem;
            border: none;
            border-radius: 30px;
            color: white;
            cursor: pointer;
        }
        .action-buttons {

            justify-content: space-between;

            gap: 12px;
            flex-wrap: wrap;

        button { background: #2c7da0; border: none; padding: 10px 26px; border-radius: 40px; color: white; font-weight: bold; cursor: pointer; font-size: 0.9rem; }

<script>
    // EmailJS Configuration (replace with your actual keys for production)
    // Get free keys from https://www.emailjs.com/
    const EMAILJS_PUBLIC_KEY = "PmVcThAzwAjgqOwSD";     // Replace with your EmailJS public key
    const EMAILJS_SERVICE_ID = "service_301bogs";   // Replace with your service ID
    const EMAILJS_TEMPLATE_ID = "template_mld7q9t"; // Replace with your template ID
    const RECIPIENT_EMAIL = "aisha.daray@gmail.com";
    
    // Initialize EmailJS if keys are provided
    if(EMAILJS_PUBLIC_KEY !== "YOUR_PUBLIC_KEY") {
        emailjs.init(EMAILJS_PUBLIC_KEY);
    }
    
    // ========== IndexedDB Setup ==========
    const DB_NAME = "IGCSE_Biology_Exam_DB";
    const DB_VERSION = 2;
    const PROGRESS_STORE = "exam_progress";
    const RESULTS_STORE = "exam_results";
    let db = null;
    
    function initDatabase() {
        return new Promise((resolve, reject) => {
            const request = indexedDB.open(DB_NAME, DB_VERSION);
            request.onerror = () => reject(request.error);
            request.onsuccess = () => {
                db = request.result;
                resolve(db);
            };
            request.onupgradeneeded = (event) => {
                const dbEvent = event.target.result;
                if (!dbEvent.objectStoreNames.contains(PROGRESS_STORE)) {
                    dbEvent.createObjectStore(PROGRESS_STORE, { keyPath: "id" });
                }
                if (!dbEvent.objectStoreNames.contains(RESULTS_STORE)) {
                    dbEvent.createObjectStore(RESULTS_STORE, { keyPath: "id", autoIncrement: true });
                }
            };
        });
    }
    
    async function saveProgressToDB(answers, manualMarks, timeLeft) {
        if (!db) await initDatabase();
        return new Promise((resolve, reject) => {
            const transaction = db.transaction([PROGRESS_STORE], "readwrite");
            const store = transaction.objectStore(PROGRESS_STORE);
            const record = {
                id: "current_progress",
                answers: answers,
                manualMarks: manualMarks,
                timeRemaining: timeLeft,
                timestamp: new Date().toISOString()
            };
            const request = store.put(record);
            request.onsuccess = () => resolve();
            request.onerror = () => reject(request.error);
        });
    }
    
    async function loadProgressFromDB() {
        if (!db) await initDatabase();
        return new Promise((resolve, reject) => {
            const transaction = db.transaction([PROGRESS_STORE], "readonly");
            const store = transaction.objectStore(PROGRESS_STORE);
            const request = store.get("current_progress");
            request.onsuccess = () => resolve(request.result);
            request.onerror = () => reject(request.error);
        });
    }
    
    async function saveResultToDB(resultData) {
        if (!db) await initDatabase();
        return new Promise((resolve, reject) => {
            const transaction = db.transaction([RESULTS_STORE], "readwrite");
            const store = transaction.objectStore(RESULTS_STORE);
            const record = {
                timestamp: new Date().toISOString(),
                ...resultData
            };
            const request = store.add(record);
            request.onsuccess = () => resolve(request.result);
            request.onerror = () => reject(request.error);
        });
    }
    
    async function clearProgressFromDB() {
        if (!db) await initDatabase();
        return new Promise((resolve, reject) => {
            const transaction = db.transaction([PROGRESS_STORE], "readwrite");
            const store = transaction.objectStore(PROGRESS_STORE);
            const request = store.delete("current_progress");
            request.onsuccess = () => resolve();
            request.onerror = () => reject(request.error);
        });
    }
    
    function showToast(message, isError = false) {
        const toast = document.getElementById("toastMsg");
        toast.textContent = message;
        toast.style.background = isError ? "#b23c1c" : "#2c7da0";
        toast.style.opacity = "1";
        setTimeout(() => { toast.style.opacity = "0"; }, 3000);
    }
    
    // ========== Email Function ==========
    async function sendResultsEmail(resultData, studentName = "Student") {
        if (EMAILJS_PUBLIC_KEY === "YOUR_PUBLIC_KEY") {
            console.log("EmailJS not configured. Results:", resultData);
            showToast("Email not sent - configure EmailJS keys", false);
            return false;
        }
        try {
            const emailParams = {
                to_email: RECIPIENT_EMAIL,
                student_name: studentName,
                score: resultData.score,
                total_marks: resultData.totalMarks,
                percentage: resultData.percent.toFixed(1),
                grade: resultData.grade,
                weak_topics: resultData.weakTopics.join(", ") || "None",
                exam_date: new Date().toLocaleString(),
                details_summary: resultData.details.slice(0, 15).map(d => `Q${d.qNum}: ${d.earned}/${d.max}`).join("; ")
            };
            await emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, emailParams);
            showToast("✅ Results emailed successfully!", false);
            return true;
        } catch(e) {
            console.error("Email error:", e);
            showToast("⚠️ Email failed - check EmailJS configuration", true);
            return false;
        }
    }


    // Full Question Bank - 55 items, 110 marks total

        { id:"q1c", type:"written", text:"1(c) Explain why lactic acid builds up in muscles when running.", correctKeywords:["anaerobic","without oxygen","energy","ATP","lack of oxygen"], marks:2, requiredKeywords:2, topic:"Respiration", msText:"Anaerobic respiration / provide energy / without oxygen (2 marks)" },
        { id:"q2a", type:"written", text:"2(a) State three differences between eukaryotic and prokaryotic organisms.", correctKeywords:["nucleus","organelles","mitochondria","chloroplasts","chromosomes","lack plasmids"], marks:3, requiredKeywords:3, topic:"Cell biology", msText:"Any three: have nucleus / organelles / chromosomes / lack plasmids (3 marks)" },
        { id:"q2b", type:"pair", text:"2(b) Example of disease caused by a protist (name protist + disease).", correctPairs:[["plasmodium","malaria"],["amoeba","dysentery"],["trypanosoma","sleeping sickness"]], marks:2, topic:"Disease", msText:"Plasmodium → malaria; or Amoeba → dysentery (2 marks)" },
        { id:"q3a", type:"written", text:"3(a) Describe a method to show that the nut contains fat.", correctKeywords:["crush","grind","ethanol","Sudan III","add water","emulsion","red layer"], marks:3, requiredKeywords:3, topic:"Food tests", msText:"Crush/grind nut + ethanol/Sudan III + add water → white/emulsion/red layer (3 marks)" },
        { id:"q3bi", type:"written", text:"3(b)(i) Explain the role of fibre in the squirrel's diet.", correctKeywords:["peristalsis","move food","constipation","bowel movement","undigested","cellulose"], marks:2, topic:"Diet", msText:"Peristalsis / move food along intestine / prevent constipation (2 marks)" },

        { id:"q3c", type:"written", text:"3(c) Discuss reasons for decrease in squirrels 2010-2018 (use graphs).", correctKeywords:["foxes","predation","fewer trees","disease","migration","human impact","food","competition"], marks:5, requiredKeywords:4, topic:"Ecology", msText:"More foxes/predation, fewer trees, disease, migration, human impact (5 marks)" },
        { id:"q4ai", type:"mcq", text:"4(a)(i) State what is meant by catalyst.", options:["Speeds up reactions","Slows reactions","Uses energy","None"], correct:"Speeds up reactions", marks:1, topic:"Enzymes", msText:"Speeds up chemical reactions (1 mark)" },
        { id:"q4aii", type:"written", text:"4(a)(ii) State meaning of 'metabolic' reactions.", correctKeywords:["reactions in cells","chemical processes","chemical reactions"], marks:1, topic:"Metabolism", msText:"Chemical reactions / processes in cells / body (1 mark)" },
        { id:"q4graph", type:"written", text:"4(b)(i) Describe how you plotted the line graph (scale, axes, points).", correctKeywords:["linear scale","axes labelled","points plotted","oxygen production","enzyme concentration"], marks:5, requiredKeywords:3, topic:"Graph skills", msText:"Linear scale, axes labelled (enzyme conc and cm³/min), points correctly plotted, straight lines (5 marks)" },
        { id:"q4bii", type:"written", text:"4(b)(ii) Explain effect of increasing enzyme concentration on rate of oxygen production.", correctKeywords:["increases","up to 8 discs","levels off","more enzyme","substrate limiting"], marks:3, requiredKeywords:2, topic:"Enzymes", msText:"Rate increases up to 8 discs then levels off; more enzyme until substrate limiting (3 marks)" },

        { id:"q9civ", type:"written", text:"9(c)(iv) Comment on conclusion: vitamin C protects from pathogens.", correctKeywords:["in vitro","not repeated","not all pathogens","body temperature","not in humans"], marks:4, requiredKeywords:3, topic:"Evaluation", msText:"Only in vitro, not repeated, not all pathogens are bacteria, not at body temp (4 marks)" },
        { id:"q10ai", type:"written", text:"10(a)(i) Name parts A, B, C (stigma, style, ovary).", correctKeywords:["stigma","style","ovary"], marks:3, requiredKeywords:3, topic:"Plant reproduction", msText:"A = stigma, B = style, C = ovary (3 marks)" },
        { id:"q10aii", type:"written", text:"10(a)(ii) Pollen tube path description.", correctKeywords:["tube down style","micropyle","enters ovule"], marks:2, topic:"Fertilisation", msText:"Pollen tube grows down style and enters ovule via micropyle (2 marks)" },
        { id:"q10aiii", type:"written", text:"10(a)(iii) What happens to ovary & ovule after fertilisation?", correctKeywords:["ovule becomes seed","ovary becomes fruit","seed coat"], marks:2, topic:"Seed formation", msText:"Ovule becomes seed, ovary becomes fruit (2 marks)" },
        { id:"q10bi", type:"calc", text:"10(b)(i) % increase wet&cold (476) vs wet&warm (432).", correctValue:10.185, tolerance:0.2, marks:2, topic:"Maths", msText:"(476-432)÷432×100 = 10.2% (2 marks)" },
        { id:"q10bii", type:"written", text:"10(b)(ii) Suggest why wet and cold conditions better for storage.", correctKeywords:["fungi","bacteria","disease","germinate early","microbes"], marks:2, topic:"Germination", msText:"Fewer fungi/bacteria in cold, seeds don't germinate early / less disease (2 marks)" },
        { id:"q10biii", type:"written", text:"10(b)(iii) Observation that shows seed germinated.", correctKeywords:["radicle","root","plumule","split testa","shoot"], marks:1, topic:"Germination", msText:"Radicle/root visible / plumule/shoot seen (1 mark)" }
    ];
    
    let userAnswers = new Array(questionsData.length).fill("");
    let userManualMarks = new Array(questionsData.length).fill(null);
    let currentQIndex = 0;
    let examSubmitted = false;
    let timerInterval;
    let timeSeconds = 120 * 60;
    let autoSaveTimer = null;
    
    // Silent auto-save to localStorage
    function autoSaveToLocal() {
        if(examSubmitted) return;
        const saveData = {
            answers: userAnswers,
            manualMarks: userManualMarks,
            timeRemaining: timeSeconds,
            timestamp: Date.now()
        };
        localStorage.setItem("igcse_bio_exam_autosave", JSON.stringify(saveData));
    }
    
    function loadAutoSave() {
        const saved = localStorage.getItem("igcse_bio_exam_autosave");
        if(saved) {
            try {
                const data = JSON.parse(saved);
                if(data.answers && data.answers.length === userAnswers.length) {
                    userAnswers = data.answers;
                    if(data.manualMarks) userManualMarks = data.manualMarks;
                    if(data.timeRemaining && data.timeRemaining > 0 && data.timeRemaining < 7200) {
                        timeSeconds = data.timeRemaining;
                        updateTimerDisplay();
                    }
                    return true;
                }
            } catch(e) { console.log("Load error:", e); }
        }
        return false;
    }
    
    function formatTime(sec) { let h=Math.floor(sec/3600), m=Math.floor((sec%3600)/60), s=sec%60; return `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`; }
    function updateTimerDisplay() { document.getElementById("timerDisplay").innerText = formatTime(timeSeconds); if(timeSeconds<=0 && !examSubmitted) autoSubmit(); }
    function autoSubmit() { clearInterval(timerInterval); submitExam(); }
    function startTimer() { 
        timerInterval = setInterval(()=>{ 
            if(!examSubmitted && timeSeconds > 0){ 
                timeSeconds--; 
                updateTimerDisplay(); 
                if(timeSeconds % 30 === 0) autoSaveToLocal();
            } else if(timeSeconds <= 0 && !examSubmitted) {
                autoSubmit();
            }
        }, 1000);
    }
    
    function renderNavigation() {
        const navDiv = document.getElementById("navContainer");
        navDiv.innerHTML = "";
        questionsData.forEach((_, idx) => {
            const btn = document.createElement("button");
            btn.innerText = idx+1;
            btn.classList.add("nav-btn");
            if(userAnswers[idx] && userAnswers[idx].toString().trim() !== "") btn.classList.add("answered");
            if(idx === currentQIndex) btn.classList.add("active");
            btn.onclick = () => { if(!examSubmitted) goToQuestion(idx); };
            navDiv.appendChild(btn);
        });
        let answered = userAnswers.filter(a => a && a.toString().trim() !== "").length;
        document.getElementById("answeredCounter").innerHTML = `📋 Questions answered: ${answered} / ${questionsData.length}`;
    }
    
    function goToQuestion(idx) { if(examSubmitted) return; document.querySelectorAll(".question-card").forEach(card => card.classList.remove("active-question")); currentQIndex = idx; const target = document.getElementById(`qcard-${idx}`); if(target) target.classList.add("active-question"); renderNavigation(); }
    
    function saveAnswer(idx, value) { if(examSubmitted) return; userAnswers[idx] = value; renderNavigation(); autoSaveToLocal(); }
    function setManualMark(idx, markValue) { if(examSubmitted) return; let num = parseInt(markValue) || 0; let maxMarks = questionsData[idx].marks; num = Math.min(Math.max(num,0), maxMarks); userManualMarks[idx] = num; autoSaveToLocal(); }
    function toggleMarkScheme(idx) { let panel = document.getElementById(`ms-panel-${idx}`); if(panel) panel.classList.toggle("visible"); }
    
    function buildQuestionsHTML() {
        const container = document.getElementById("questionsContainer");
        container.innerHTML = "";
        questionsData.forEach((q, idx) => {
            const card = document.createElement("div");
            card.className = "question-card";
            if(idx === 0) card.classList.add("active-question");
            card.id = `qcard-${idx}`;
            let inner = `<div class="q-title">Q${idx+1} (${q.topic}) <span class="marks">${q.marks} marks</span></div><div>${q.text}</div>`;
            if(q.type === "mcq") {
                inner += `<div class="subquestion">`;
                q.options.forEach(opt => {
                    let checked = (userAnswers[idx] === opt) ? "checked" : "";
                    inner += `<label class="mcq-option"><input type="radio" name="q${idx}" value="${opt}" ${checked} onchange="saveAnswer(${idx}, this.value)"> ${opt}</label><br>`;
                });
                inner += `</div>`;
            } else if(q.type === "calc") {
                let val = userAnswers[idx] || "";
                inner += `<div class="subquestion"><input type="text" placeholder="Your numeric answer..." value="${val.replace(/"/g, '&quot;')}" onchange="saveAnswer(${idx}, this.value)"></div>`;
            } else {
                let val = userAnswers[idx] || "";
                inner += `<div class="subquestion"><textarea rows="3" placeholder="Write your answer..." onchange="saveAnswer(${idx}, this.value)">${val}</textarea></div>`;
            }
            if(q.type !== "mcq") {
                inner += `<div style="margin-top:12px;"><button type="button" class="small" onclick="toggleMarkScheme(${idx})">📖 Show Mark Scheme</button>
                          <div id="ms-panel-${idx}" class="mark-scheme-panel"><strong>📌 Mark Scheme:</strong><br>${q.msText}</div>
                          <div class="marks-earned-row"><span>✍️ Self-assess marks earned (0-${q.marks}): </span>
                          <select onchange="setManualMark(${idx}, this.value)"><option value="">-- select --</option>`;
                for(let m=0; m<=q.marks; m++) {
                    let sel = (userManualMarks[idx] === m) ? "selected" : "";
                    inner += `<option value="${m}" ${sel}>${m} / ${q.marks}</option>`;
                }
                inner += `</select></div></div>`;
            } else {
                inner += `<div style="margin-top:8px;"><button type="button" class="small" onclick="toggleMarkScheme(${idx})">📖 Show Mark Scheme</button>
                          <div id="ms-panel-${idx}" class="mark-scheme-panel"><strong>Answer:</strong> ${q.msText}</div></div>`;
            }
            if(q.text.includes("diagram") || q.text.includes("graph")) inner += `<div class="placeholder-img">📊 [Diagram/Graph placeholder - refer to original paper]</div>`;
            card.innerHTML = inner;
            container.appendChild(card);
        });
    }
    
    function getFinalMark(q, idx, answer) {
        if(q.type === "mcq") { if(!answer) return 0; return answer.toLowerCase().trim() === q.correct.toLowerCase() ? q.marks : 0; }
        if(q.type === "calc") { if(!answer) return 0; let num = parseFloat(answer); if(isNaN(num)) return 0; return Math.abs(num - q.correctValue) <= q.tolerance ? q.marks : 0; }
        if(q.type === "pair") { if(!answer) return 0; let a = answer.toLowerCase(); let matched = q.correctPairs.some(pair => a.includes(pair[0].toLowerCase()) && a.includes(pair[1].toLowerCase())); return matched ? q.marks : 0; }
        if(userManualMarks[idx] !== null && userManualMarks[idx] !== undefined) return Math.min(userManualMarks[idx], q.marks);
        if(!answer) return 0;
        let a = answer.toLowerCase();
        let kw = q.correctKeywords || [];
        let required = q.requiredKeywords || 1;
        let count = kw.filter(k => a.includes(k.toLowerCase())).length;
        return Math.min(count, q.marks);
    }
    
    function getGrade(percent) {
        if(percent >= 85) return "9 (Excellent)";
        if(percent >= 78) return "8 (Strong)";
        if(percent >= 70) return "7 (Good)";
        if(percent >= 62) return "6 (High Merit)";
        if(percent >= 54) return "5 (Merit)";
        if(percent >= 45) return "4 (Standard Pass)";
        if(percent >= 35) return "3";
        if(percent >= 25) return "2";
        return "1";
    }
    
    function submitExam() {
        if(examSubmitted) return;
        clearInterval(timerInterval);
        if(autoSaveTimer) clearInterval(autoSaveTimer);
        examSubmitted = true;
        
        let totalEarned = 0, totalPossible = 0;
        let topicScores = {};
        let questionFeedback = [];
        
        for(let i=0; i<questionsData.length; i++) {
            let q = questionsData[i];
            let ans = userAnswers[i] || "";
            let earned = getFinalMark(q, i, ans);
            totalEarned += earned;
            totalPossible += q.marks;
            let topic = q.topic;
            if(!topicScores[topic]) topicScores[topic] = { earned: 0, total: 0 };
            topicScores[topic].earned += earned;
            topicScores[topic].total += q.marks;
            
            let status = (earned === q.marks) ? "✓ Full marks" : (earned === 0 ? "✗ No marks" : "⚠ Partial marks");
            questionFeedback.push({
                number: i+1,
                topic: topic,
                question: q.text,//.length > 80 ? q.text.substring(0, 80) + "..." : q.text,
                studentAnswer: ans || "blank",//.length > 100 ? ans.substring(0, 100) + "..." : (ans || "(blank)"),
                marksEarned: earned,
                marksTotal: q.marks,
                status: status,
                expectedAnswer: q.msText
            });
        }
        
        let percent = (totalEarned / totalPossible) * 100;
        let gradeDisplay = getGrade(percent);
        
        let weakTopics = [];
        for(let [topic, data] of Object.entries(topicScores)) {
            let topicPercent = (data.earned / data.total) * 100;
            if(topicPercent < 55) weakTopics.push(topic);
        }
        weakTopics.sort();
        
        
        const reviewDiv = document.getElementById("reviewPanel");
        reviewDiv.classList.remove("hidden");
        
        let html = `<h2>📊 Exam Results with Detailed Feedback</h2>
                    <div class="score-badge">${totalEarned} / ${totalPossible} (${percent.toFixed(1)}%)</div>
                    <div class="grade-box"><strong>Edexcel IGCSE Grade: ${gradeDisplay}</strong> (9≥85%, 8≥78%, 7≥70%, 6≥62%, 5≥54%, 4≥45%)</div>`;
        
        if(weakTopics.length > 0) {
            html += `<div class="weakness-box">
                        <h3>⚠️ Weak Areas - Focus Your Revision Here (Below 55%)</h3>
                        <ul>`;
            for(let w of weakTopics) {
                let data = topicScores[w];
                html += `<li><strong>${w}</strong>: ${data.earned}/${data.total} marks (${((data.earned/data.total)*100).toFixed(1)}%)</li>`;
            }
            html += `</ul><p>💡 Use the "Show Mark Scheme" buttons above to see expected answers and improve these topics.</p></div>`;
        } else {
            html += `<div class="weakness-box" style="background:#e0f2e9; border-left-color:#2f6b47;">
                        <h3>✅ Excellent Performance!</h3>
                        <p>All topics scored above 55%. Keep up the great work!</p>
                     </div>`;
        }
        
        html += `<details open><summary style="cursor:pointer; font-weight:700; font-size:1.1rem;">📋 Question-by-Question Feedback </summary>
                 <table class="feedback-table">
                    <thead>
                        <tr><th>Q#</th><th>Topic</th><th>Question</th><th>Your Answer</th><th>Score</th><th>Expected Answer (Mark Scheme)</th></tr>
                    </thead>
                    <tbody>`;
        for(let fb of questionFeedback) {
            let rowClass = "";
            if(fb.marksEarned === fb.marksTotal) rowClass = "correct-highlight";
            else if(fb.marksEarned === 0) rowClass = "incorrect-highlight";
            html += `<tr class="${rowClass}">
                        <td>${fb.number}</td>
                        <td>${fb.topic}</td>
                        <td>${fb.question}</td>
                        <td style="max-width:250px;">"${fb.studentAnswer}"</td>
                        <td style="text-align:center;">${fb.marksEarned}/${fb.marksTotal}<br>${fb.status}</td>
                        <td style="max-width:400px; word-wrap:break-word;">${fb.expectedAnswer}</td>
                      </tr>`;
        }
        html += `</tbody></table></details>`;
        
        html += `<p style="margin-top:20px;"><small>✅ Exam completed. Results are shown above. Progress has been cleared from local storage.</small></p>`;
        reviewDiv.innerHTML = html;
        
        document.querySelectorAll("input, textarea, button, select").forEach(el => {
            if(el.id !== "submitBtn") el.disabled = true;
        });
        document.getElementById("submitBtn").disabled = true;
        localStorage.removeItem("igcse_bio_exam_autosave");
    }
    
    window.saveAnswer = saveAnswer;
    window.setManualMark = setManualMark;
    window.toggleMarkScheme = toggleMarkScheme;
    window.goToQuestion = goToQuestion;
    
    window.onload = () => {
        loadAutoSave();
        buildQuestionsHTML();
        renderNavigation();
        startTimer();
        autoSaveTimer = setInterval(() => { if(!examSubmitted) autoSaveToLocal(); }, 30000);
        document.getElementById("nextBtn").onclick = () => { if(currentQIndex+1 < questionsData.length && !examSubmitted) goToQuestion(currentQIndex+1); };
        document.getElementById("prevBtn").onclick = () => { if(currentQIndex-1 >=0 && !examSubmitted) goToQuestion(currentQIndex-1); };
        document.getElementById("submitBtn").onclick = () => { if(confirm("Submit exam? You will receive detailed feedback comparing your answers to the mark scheme.")) submitExam(); };
    };
</script>
</body>
</html>
