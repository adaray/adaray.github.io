<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Pearson Edexcel International GCSE | Interactive with Auto Graph Detection</title>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>   
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 20px;
            color: #1e2a3e;
        }
        .exam-container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 28px;
            box-shadow: 0 12px 30px rgba(0,0,0,0.1);
            overflow: hidden;
            padding: 20px 30px 40px;
        }
        .header {
            border-bottom: 3px solid #2c7da0;
            padding-bottom: 15px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
        }
        .title h1 { margin: 0; font-size: 1.7rem; color: #0b3b4f; }
        .title p { margin: 5px 0 0; color: #2c7da0; font-weight: 500; }
        .timer-area { background: #1e2a3e; padding: 8px 18px; border-radius: 60px; color: white; text-align: center; font-weight: bold; }
        .timer { font-size: 2rem; font-family: monospace; letter-spacing: 2px; }
        .info-bar {
            background: #e9f0f5;
            padding: 10px 20px;
            border-radius: 28px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
        }
        .question-nav {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 25px;
            border-bottom: 1px solid #cbd5e1;
            padding-bottom: 15px;
            max-height: 150px;
            overflow-y: auto;
        }
        .nav-btn {
            background: #eef2f6;
            border: none;
            width: 42px;
            height: 42px;
            border-radius: 42px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.1s;
            font-size: 0.9rem;
        }
        .nav-btn.active { background: #2c7da0; color: white; }
        .nav-btn.answered { background: #61a5c2; color: white; }
        .question-card {
            display: none;
            background: #ffffff;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 30px;
            border: 1px solid #e2e8f0;
        }
        .question-card.active-question { display: block; }
        .q-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 15px;
            background: #f0f6fa;
            padding: 6px 12px;
            border-radius: 30px;
            display: inline-block;
        }
        .marks { font-size: 0.8rem; background: #cbd5e1; border-radius: 20px; padding: 2px 10px; margin-left: 12px; }
        .subquestion { margin: 20px 0 20px 12px; border-left: 3px solid #cbd5e1; padding-left: 18px; }
        .placeholder-img {
            background: #eef2f9;
            border: 1px dashed #8ba0bc;
            padding: 20px;
            text-align: center;
            border-radius: 16px;
            margin: 15px 0;
            font-style: italic;
            color: #2c3e66;
        }
        .mcq-option { margin: 10px 0; }
        input[type="text"], input[type="number"], textarea {
            padding: 10px 14px;
            border-radius: 14px;
            border: 1px solid #b9c7d9;
            width: 100%;
            max-width: 550px;
            font-family: inherit;
        }
        textarea { max-width: 100%; }
        .action-buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 30px;
            gap: 12px;
            flex-wrap: wrap;
        }
        button { background: #2c7da0; border: none; padding: 10px 26px; border-radius: 40px; color: white; font-weight: bold; cursor: pointer; font-size: 0.9rem; }
        button.secondary { background: #6c757d; }
        button.warning { background: #b23c1c; }
        button:disabled { opacity: 0.6; cursor: not-allowed; }
        .review-section { background: #fef9e3; padding: 20px; border-radius: 20px; margin-top: 30px; }
        .hidden { display: none; }
        .score-badge { font-size: 2rem; font-weight: bold; color: #1e2a3e; }
        .grade-box { background: #d9e6f2; padding: 12px; border-radius: 24px; margin: 15px 0; }
        .weakness-box { background: #ffe6e6; padding: 16px; border-radius: 20px; margin-top: 20px; border-left: 8px solid #c7362b; }
        .feedback-table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        .feedback-table th, .feedback-table td { border: 1px solid #ddd; padding: 10px; vertical-align: top; text-align: left; }
        .feedback-table th { background: #2c7da0; color: white; }
        .feedback-table tr:nth-child(even) { background: #f9f9f9; }
        .correct-highlight { background: #d4edda; }
        .incorrect-highlight { background: #f8d7da; }
        details summary { cursor: pointer; font-weight: 600; margin: 15px 0; }
        footer { text-align: center; font-size: 0.8rem; margin-top: 30px; color: #6c757d; }
        .status-toast {
            position: fixed; bottom: 20px; right: 20px;
            background: #2c7da0; color: white; padding: 8px 16px;
            border-radius: 30px; font-size: 0.8rem; opacity: 0;
            transition: opacity 0.3s; pointer-events: none; z-index: 1000;
        }
        .loading-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            backdrop-filter: blur(3px);
        }
        .loading-spinner {
            background: white;
            padding: 30px 40px;
            border-radius: 30px;
            text-align: center;
            font-weight: bold;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }
        .spinner {
            border: 4px solid #e9f0f5;
            border-top: 4px solid #2c7da0;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @media (max-width: 700px) { .exam-container { padding: 15px; } .timer { font-size: 1.4rem; } .feedback-table { font-size: 0.8rem; } }
        .ai-badge { background: #4a6fa5; color: white; font-size: 0.7rem; border-radius: 20px; padding: 2px 10px; margin-left: 10px; vertical-align: middle; }
        .ms-badge { background: #f4a261; color: white; font-size: 0.7rem; border-radius: 20px; padding: 2px 10px; margin-left: 10px; vertical-align: middle; }
        .ms-panel { background: #f8f9fc; border-left: 5px solid #f4a261; padding: 12px 16px; margin-top: 15px; border-radius: 16px; font-size: 0.9rem; display: none; }
        .ms-panel.visible { display: block; }
        .marks-earned-row {
            margin-top: 12px;
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        .marks-earned-row select {
            padding: 6px 12px;
            border-radius: 30px;
            background: white;
            border: 1px solid #b9c7d9;
            font-weight: bold;
        }
        button.small {
            background: #e76f51;
            padding: 5px 12px;
            font-size: 0.7rem;
            border: none;
            border-radius: 30px;
            color: white;
            cursor: pointer;
        }
        .graph-badge {
            background: #f4a261;
            color: white;
            font-size: 0.7rem;
            border-radius: 20px;
            padding: 2px 10px;
            margin-left: 10px;
            vertical-align: middle;
        }
    </style>
</head>
<body>
<div class="exam-container" id="examApp">
    <div class="header">
        <div class="title">
            <h1>Edexcel IGCSE Biology (4BI1)</h1>
            <p>Biology Paper 1B | June 2024</p>
        </div>
        <div class="timer-area">
            <div>Time Remaining</div>
            <div class="timer" id="timerDisplay">02:00:00</div>
        </div>
    </div>
    <div class="info-bar">
        <span>⏱️ 2 hours | 📝 Total marks: 110</span>
        <span id="answeredCounter">📋 Questions answered: 0 / 55</span>
        <span id="graphCounter">📊 Graph/Practical questions: 0</span>
    </div>
    <div id="navContainer" class="question-nav"></div>
    <div id="questionsContainer"></div>
    <div class="action-buttons">
        <button id="prevBtn" class="secondary">◀ Previous</button>
        <button id="nextBtn">Next ▶</button>
        <button id="submitBtn" class="warning">Submit Exam</button>
    </div>
    <div id="reviewPanel" class="review-section hidden"></div>
    <div id="statusToast" class="status-toast"></div>
</div>

<script>
    
    const EXAM_TITLE = "Edexcel IGCSE Biology (4BI1) - June 2024 Paper 1B";

    // ========== OPENAI CONFIGURATION ==========
    const OPENAI_API_KEY="OPENAI_API_KEY_PLACEHOLDER";  // <-- PASTE YOUR OPENAI API KEY HERE
    const OPENAI_MODEL = "gpt-3.5-turbo";
    const EMAILJS_PUBLIC_KEY = "PmVcThAzwAjgqOwSD";     // Replace with your EmailJS public key
    const EMAILJS_SERVICE_ID = "service_301bogs";   // Replace with your service ID
    const EMAILJS_TEMPLATE_ID = "template_mld7q9t"; // Replace with your template ID
    const RECIPIENT_EMAIL = "aisha.daray@gmail.com";
    
    if(EMAILJS_PUBLIC_KEY && EMAILJS_PUBLIC_KEY !== "YOUR_PUBLIC_KEY") {
        try {
            emailjs.init(EMAILJS_PUBLIC_KEY);
        } catch(e) {
            console.log("EmailJS init error:", e);
        }
    }
    
    // ========== AUTO DETECTION FUNCTION FOR GRAPH QUESTIONS ==========
    // This function automatically detects if a question requires graph/drawing/plotting
 // MODIFIED: Only detects when type is 'graph' OR 'practical'
    function isGraphOrPracticalQuestion(question) {
        // Only return true if type is exactly 'graph' OR 'practical'
        return question.type === 'graph' || question.type === 'practical';
    }
    
    // ========== IndexedDB Setup ==========
    const DB_NAME = "IGCSE_Biology_Exam_DB";
    const DB_VERSION = 2;
    const PROGRESS_STORE = "exam_progress";
    const RESULTS_STORE = "exam_results";
    let db = null;
    
    function initDatabase() {
        return new Promise((resolve, reject) => {
            const request = indexedDB.open(DB_NAME, DB_VERSION);
            request.onerror = () => reject(request.error);
            request.onsuccess = () => {
                db = request.result;
                resolve(db);
            };
            request.onupgradeneeded = (event) => {
                const dbEvent = event.target.result;
                if (!dbEvent.objectStoreNames.contains(PROGRESS_STORE)) {
                    dbEvent.createObjectStore(PROGRESS_STORE, { keyPath: "id" });
                }
                if (!dbEvent.objectStoreNames.contains(RESULTS_STORE)) {
                    dbEvent.createObjectStore(RESULTS_STORE, { keyPath: "id", autoIncrement: true });
                }
            };
        });
    }
    
    async function saveProgressToDB(answers, manualMarks, timeLeft) {
        if (!db) await initDatabase();
        return new Promise((resolve, reject) => {
            const transaction = db.transaction([PROGRESS_STORE], "readwrite");
            const store = transaction.objectStore(PROGRESS_STORE);
            const record = {
                id: "current_progress",
                answers: answers,
                manualMarks: manualMarks,
                timeRemaining: timeLeft,
                timestamp: new Date().toISOString()
            };
            const request = store.put(record);
            request.onsuccess = () => resolve();
            request.onerror = () => reject(request.error);
        });
    }
    
    async function loadProgressFromDB() {
        if (!db) await initDatabase();
        return new Promise((resolve, reject) => {
            const transaction = db.transaction([PROGRESS_STORE], "readonly");
            const store = transaction.objectStore(PROGRESS_STORE);
            const request = store.get("current_progress");
            request.onsuccess = () => resolve(request.result);
            request.onerror = () => reject(request.error);
        });
    }
    
    async function saveResultToDB(resultData) {
        if (!db) await initDatabase();
        return new Promise((resolve, reject) => {
            const transaction = db.transaction([RESULTS_STORE], "readwrite");
            const store = transaction.objectStore(RESULTS_STORE);
            const record = {
                timestamp: new Date().toISOString(),
                ...resultData
            };
            const request = store.add(record);
            request.onsuccess = () => resolve(request.result);
            request.onerror = () => reject(request.error);
        });
    }
    
    async function clearProgressFromDB() {
        if (!db) await initDatabase();
        return new Promise((resolve, reject) => {
            const transaction = db.transaction([PROGRESS_STORE], "readwrite");
            const store = transaction.objectStore(PROGRESS_STORE);
            const request = store.delete("current_progress");
            request.onsuccess = () => resolve();
            request.onerror = () => reject(request.error);
        });
    }
    
    function showToast(message, isError = false) {
        const toast = document.getElementById("statusToast");
        if (!toast) return;
        toast.textContent = message;
        toast.style.background = isError ? "#b23c1c" : "#2c7da0";
        toast.style.opacity = "1";
        setTimeout(() => { toast.style.opacity = "0"; }, 3000);
    }
    
    async function sendResultsEmail(resultData, studentName = "Student") {
        if (EMAILJS_PUBLIC_KEY === "YOUR_PUBLIC_KEY") {
            console.log("EmailJS not configured. Results:", resultData);
            showToast("Email not sent - configure EmailJS keys", false);
            return false;
        }
        try {
            const emailParams = {
                EXAM_TITLE: EXAM_TITLE,
                to_email: RECIPIENT_EMAIL,
                student_name: studentName,
                score: resultData.score,
                total_marks: resultData.totalMarks,
                percentage: resultData.percent.toFixed(1),
                grade: resultData.grade,
                weak_topics: resultData.weakTopics.join(", ") || "None",
                exam_date: new Date().toLocaleString(),
                details_summary: resultData.details.map(d => `Q${d.qNum}: ${d.earned}/${d.max}`).join("; ")
            };
            await emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, emailParams);
            showToast("✅ Results emailed successfully!", false);
            return true;
        } catch(e) {
            console.error("Email error:", e);
            showToast("⚠️ Email failed - check EmailJS configuration", true);
            return false;
        }
    }
    
    // ========== Question Bank (without isGraphical flag - will be auto-detected) ==========
    const questionsDataRaw = [
        { id:"q1ai", type:"mcq", text:"1(a)(i) Which is the producer in this food web?", options:["A beetle","B deer","C oak tree","D tick"], correct:"C oak tree", marks:1, topic:"Ecology/Food webs", msText:"C (oak tree)" },
        { id:"q1aii", type:"written", text:"1(a)(ii) Draw a food chain that includes the mouse and contains four trophic levels.", correctKeywords:["oak/tree → caterpillar → mouse → tick"], marks:2, requiredKeywords:2, topic:"Ecology/Food chains", msText:"oak/tree → caterpillar → mouse → tick (2 marks for correct order and arrows)" },
        { id:"q1aiii", type:"mcq", text:"1(a)(iii) Which organism is in two different trophic levels?", options:["A ant","B blue jay","C caterpillar","D mouse"], correct:"D mouse", marks:1, topic:"Ecology/Food webs", msText:"D (mouse)" },
        { id:"q1bi", type:"calc", text:"1(b)(i) Calculate magnification of tick image (actual length 3.5mm, measure diagram ~10.4cm).", correctValue:29.7, tolerance:0.7, marks:2, topic:"Microscopy/Maths", msText:"measurement ~10.4cm = 104mm; magnification = 104 ÷ 3.5 = 29.7 (2)" },
        { id:"q1bii", type:"written", text:"1(b)(ii) Give the function of two named substances absorbed by the tick from blood.", correctKeywords:["glucose for energy/respiration","iron for haemoglobin/red blood cells","amino acids for protein synthesis","proteins for growth","lipids for energy/insulation","water for hydration/transport/solvent","Vitamin C prevents scurvy"], marks:4, requiredKeywords:4, topic:"Diet/Nutrition", msText:"glucose for energy/respiration (1); iron for haemoglobin/red blood cells (1); amino acids for protein synthesis (1); proteins for growth (1); lipids for energy/insulation (1); water for hydration/transport/solvent (1)" },
        { id:"q1biii", type:"written", text:"1(b)(iii) Suggest how ticks can pass diseases from one organism to another.", correctKeywords:["tick picks up / bites / sucks blood from infected animal","bacteria / virus / pathogen","feed / bite (new/uninfected) other animal"], marks:2, requiredKeywords:2, topic:"Disease/Vectors", msText:"tick picks up / bites / sucks blood from infected animal (1); bacteria / virus / pathogen (1); feed / bite (new/uninfected) other animal (1)" },
        { id:"q2ai", type:"mcq", text:"2(a)(i) Which structure is the style? (flower diagram)", options:["A P","B Q","C S","D T"], correct:"B Q", marks:1, topic:"Plant reproduction", msText:"B (Q)" },
        { id:"q2aii", type:"mcq", text:"2(a)(ii) Which structure releases pollen?", options:["A P","B R","C T","D U"], correct:"D U", marks:1, topic:"Plant reproduction", msText:"D (U)" },
        { id:"q2aiii", type:"mcq", text:"2(a)(iii) On which structure do pollen grains germinate?", options:["A P","B R","C S","D U"], correct:"A P", marks:1, topic:"Plant reproduction", msText:"A (P)" },
        { id:"q2b", type:"written", text:"2(b) Describe how structures P (stigma), R (petal) and T (anther) would be different in a wind-pollinated flower.", correctKeywords:["P feathery / large surface area / outside flower / exposed","R absent / smaller / not coloured / green","T longer / hinged / outside flower / exposed"], marks:3, requiredKeywords:3, topic:"Plant reproduction", msText:"P feathery / large surface area / outside flower (1); R absent / smaller / not coloured / green (1); T longer / hinged / outside flower / exposed (1)" },
        { id:"q2ci", type:"written", text:"2(c)(i) Give an example of a natural method of asexual reproduction in plants.", correctKeywords:["runners / bulbs / corms / tubers / rhizomes"], marks:1, topic:"Plant reproduction", msText:"runners / bulbs / corms / tubers / rhizomes (1)" },
        { id:"q2cii", type:"written", text:"2(c)(ii) Give an example of an artificial method of asexual reproduction in plants.", correctKeywords:["cuttings / grafting / layering / tissue culture / micropropagation"], marks:1, topic:"Plant reproduction", msText:"cuttings / grafting / layering / tissue culture / micropropagation (1)" },
        { id:"q2d", type:"written", text:"2(d) Give three differences between asexual and sexual reproduction.", correctKeywords:["no gametes/meiosis in asexual vs gametes/meiosis in sexual","no fusion/fertilisation in asexual vs fusion/fertilisation in sexual","offspring clones/no variation in asexual vs variation in sexual","asexual faster vs sexual slower"], marks:3, requiredKeywords:3, topic:"Reproduction", msText:"no gametes/meiosis in asexual (1); no fusion/fertilisation in asexual (1); offspring are clones/no genetic variation in asexual (1); asexual faster (1)" },
        { id:"q2e", type:"written", text:"2(e) Explain how the farmer could produce a variety with red flower colour and perfumed scent (cross red/no scent × white/scent).", correctKeywords:["selective breeding / artificial selection","cross red (flower) with white (flower)","select / breed offspring with red and scent","repeat for many generations"], marks:3, requiredKeywords:3, topic:"Selective breeding", msText:"selective breeding / artificial selection (1); cross red (flower)/ unscented with white (flower)/ scented (1); select / breed offspring with red and scent (1); repeat for many generations (1)" },
        { id:"q3", type:"written", text:"3 Complete the passage about yoghurt production (7 blanks).", correctKeywords:["milk","pasteurisation / sterilisation","killed","Lactobacillus / Streptococcus","lactose","anaerobic","lactic acid / lactate"], marks:7, requiredKeywords:7, topic:"Food production", msText:"milk (1); pasteurisation / sterilisation (1); killed (1); Lactobacillus / Streptococcus (1); lactose (1); anaerobic (1); lactic acid / lactate (1)" },
        { id:"q4a", type:"written", text:"4(a) Give the balanced chemical symbol equation for aerobic respiration.", correctKeywords:["C6H12O6 + 6O2 → 6CO2 + 6H2O"], marks:2, topic:"Respiration", msText:"C6H12O6 + 6O2 → 6CO2 + 6H2O (2)" },
        { id:"q4bi", type:"written", text:"4(b)(i) Explain why carbon dioxide needs to be absorbed by the soda lime when measuring rate of aerobic respiration.", correctKeywords:["bubble would not move / CO2 also moves","carbon dioxide is produced / released","(only) oxygen consumption measured"], marks:2, requiredKeywords:2, topic:"Practical/Respiration", msText:"bubble would not move / CO2 also moves (1); carbon dioxide is produced / released (1); (only) oxygen consumption measured (1)" },
        { id:"q4bii", type:"written", text:"4(b)(ii) State how the student could have changed the temperature in this investigation.", correctKeywords:["water bath"], marks:1, topic:"Practical/Respiration", msText:"water bath (1)" },
        { id:"q4ci", type:"calc", text:"4(c)(i) Calculate mean distance moved by bubble at 30°C (readings: 22, 25, 24).", correctValue:24, tolerance:0.5, marks:2, topic:"Maths/Mean", msText:"22 + 25 + 24 = 71; 71 ÷ 3 = 24 (2)" },
        { id:"q4cii", type:"written", text:"4(c)(ii) Explain the effect of increasing temperature on movement of the bubble.", correctKeywords:["increases (kinetic) energy of molecules / molecules move faster","collide more frequently / form more enzyme substrate complexes","respiration (rate) increases","more oxygen consumed / oxygen used faster","ref to nearer to optimum temperature for enzymes"], marks:3, requiredKeywords:3, topic:"Respiration/Enzymes", msText:"increases (kinetic) energy of molecules (1); collide more frequently / form more enzyme substrate complexes (1); respiration (rate) increases (1); more oxygen consumed (1); nearer to optimum temperature for enzymes (1)" },
        { id:"q5ai", type:"mcq", text:"5(a)(i) Which of these are greenhouse gases? (1 CFCs, 2 methane, 3 oxygen, 4 water vapour)", options:["A 1 and 2 only","B 1,2 and 3 only","C 1,2 and 4 only","D all of them"], correct:"C 1,2 and 4 only", marks:1, topic:"Environment/Greenhouse gases", msText:"C (1,2 and 4 only)" },
        { id:"q5aii", type:"written", text:"5(a)(ii) Explain what is meant by the term greenhouse effect.", correctKeywords:["IR / long wave radiation is absorbed / traps heat / prevents heat escaping","(so) increases (global) temperature / earth warms / global warming"], marks:2, requiredKeywords:2, topic:"Environment/Greenhouse effect", msText:"IR / long wave radiation is absorbed / traps heat (1); (so) increases (global) temperature / earth warms (1)" },
        { id:"q5bi", type:"calc", text:"5(b)(i) Calculate percentage of total greenhouse gases from energy production in 2020 (graph reading).", correctValue:23.9, tolerance:1, marks:3, topic:"Maths/Percentages", msText:"23.9-24.9% (3)" },
        { id:"q5bii", type:"written", text:"5(b)(ii) Comment on the changes in the four sources of greenhouse gases from 1990 to 2020.", correctKeywords:["overall emissions fall","energy most in 1990 / falls the most","energy now generated by wind/solar/less fossil fuels","transport increases then falls from 2009/2010","more cars then change to electric/hybrid","agriculture drops","less cattle / less methane","business little change"], marks:5, requiredKeywords:5, topic:"Data analysis/Environment", msText:"overall emissions fall (1); energy most in 1990 / falls the most (1); energy now from wind/solar/less fossil fuels (1); transport increases then falls (1); more cars then change to electric/hybrid (1); agriculture drops (1); less cattle / less methane (1); business little change (1)" },
        { id:"q6ai", type:"mcq", text:"6(a)(i) Which gas is released by the plant during photosynthesis?", options:["A carbon dioxide","B oxygen","C methane","D nitrogen"], correct:"B oxygen", marks:1, topic:"Photosynthesis", msText:"B (oxygen)" },
        { id:"q6aii", type:"mcq", text:"6(a)(ii) Which of these is the site of photosynthesis in a plant cell?", options:["A chloroplast","B mitochondrion","C nucleus","D ribosome"], correct:"A chloroplast", marks:1, topic:"Cell Biology/Photosynthesis", msText:"A (chloroplast)" },

        { id:"q9aiv", type:"written", text:"9(a)(iv) State the independent variable in this investigation.", correctKeywords:["mineral that is missing / absent from solution / minerals present / composition of solution"], marks:1, topic:"Practical/Variables", msText:"mineral that is missing / minerals present / composition of solution (1)" },
        { id:"q9bi", type:"written", text:"9(b)(i) Give the difference between quantitative and qualitative results.", correctKeywords:["quantitative uses numbers / is measured / counted","qualitative is a type / category / uses words / observed / subjective / opinion"], marks:1, topic:"Data analysis", msText:"quantitative uses numbers / is measured; qualitative is a type / category / uses words (1)" },
        { id:"q9bii", type:"written", text:"9(b)(ii) Comment on the students' results (data from mineral deficiency experiment).", correctKeywords:["complete/A has most/largest leaves / dark green","minus nitrate/B has few/small leaves / less green/yellow","nitrate required for amino acids/protein/chlorophyll/growth","minus magnesium/C has few/small leaves / less green/yellow","magnesium required for chlorophyll/chloroplasts/photosynthesis","minus iron/D has few/small leaves / less green/yellow","iron required for chlorophyll/chloroplasts/photosynthesis","not repeated / not reliable / few plants used"], marks:6, requiredKeywords:6, topic:"Data analysis/Plant nutrition", msText:"complete/A has most/largest leaves / dark green (1); minus nitrate/B has few/small leaves / less green/yellow (1); nitrate required for amino acids/protein/chlorophyll/growth (1); minus magnesium/C has few/small leaves / less green/yellow (1); magnesium required for chlorophyll/photosynthesis (1); minus iron/D has few/small leaves / less green/yellow (1); iron required for chlorophyll/photosynthesis (1); not repeated / not reliable (1)" },
        { id:"q10", type:"written", text:"10 Design an investigation to find the carbon dioxide concentration needed for maximum crop yield.", correctKeywords:["C use glasshouses with three or more concentrations/levels of CO2","O use crop plants of same species","R repeat each concentration","M1 measure mass / amount of seeds / number of leaves / fruit / size","M2 after stated time","S1 temperature / (sun)light / same season","S2 same soil / water / humidity / fertiliser / minerals / pH"], marks:6, requiredKeywords:6, topic:"Practical/Investigation design", msText:"C use glasshouses with three or more CO2 concentrations (1); O use crop plants of same species (1); R repeat each concentration (1); M1 measure mass / amount of seeds / fruit / size (1); M2 after stated time (1); S1 temperature / light / same season (1); S2 same soil / water / humidity / fertiliser (1)" }
    ];
    
    // Auto-detect graph questions and add isGraphical flag
// Auto-detect based ONLY on type
    let questionsData = questionsDataRaw.map(q => ({
        ...q,
        isGraphical: isGraphOrPracticalQuestion(q)  // Now only checks type
    }));
    
    // Count graph questions for display
    const graphQuestionCount = questionsData.filter(q => q.isGraphical).length;
    
    let userAnswers = new Array(questionsData.length).fill("");
    let userManualMarks = new Array(questionsData.length).fill(null);
    let currentQIndex = 0;
    let examSubmitted = false;
    let timerInterval;
    let timeSeconds = 120 * 60;
    let autoSaveTimer = null;
    
    function autoSaveToLocal() {
        if(examSubmitted) return;
        const saveData = {
            answers: userAnswers,
            manualMarks: userManualMarks,
            timeRemaining: timeSeconds,
            timestamp: Date.now()
        };
        localStorage.setItem("igcse_bio_exam_autosave", JSON.stringify(saveData));
    }

    function loadAutoSave() {
        const saved = localStorage.getItem("igcse_bio_exam_autosave");
        if(saved) {
            try {
                const data = JSON.parse(saved);
                if(data.answers && data.answers.length === userAnswers.length) {
                    userAnswers = data.answers;
                    if(data.manualMarks) userManualMarks = data.manualMarks;
                    if(data.timeRemaining && data.timeRemaining > 0 && data.timeRemaining < 7200) {
                        timeSeconds = data.timeRemaining;
                        updateTimerDisplay();
                    }
                    return true;
                }
            } catch(e) { console.log("Load error:", e); }
        }
        return false;
    }
    
    function formatTime(sec) { let h=Math.floor(sec/3600), m=Math.floor((sec%3600)/60), s=sec%60; return `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`; }
    function updateTimerDisplay() { document.getElementById("timerDisplay").innerText = formatTime(timeSeconds); if(timeSeconds<=0 && !examSubmitted) autoSubmitExam(); }
    function autoSubmitExam() { if(!examSubmitted) submitAndMarkExam(); }
    function startTimer() { 
        timerInterval = setInterval(()=>{ 
            if(!examSubmitted && timeSeconds > 0){ 
                timeSeconds--; 
                updateTimerDisplay(); 
                if(timeSeconds % 30 === 0) autoSaveToLocal();
            } else if(timeSeconds <= 0 && !examSubmitted) {
                autoSubmitExam();
            }
        }, 1000);
    }
    
    function renderNavigation() {
        const navDiv = document.getElementById("navContainer");
        navDiv.innerHTML = "";
        questionsData.forEach((_, idx) => {
            const btn = document.createElement("button");
            btn.innerText = idx+1;
            btn.classList.add("nav-btn");
            if(userAnswers[idx] && userAnswers[idx].toString().trim() !== "") btn.classList.add("answered");
            if(idx === currentQIndex) btn.classList.add("active");
            btn.onclick = () => { if(!examSubmitted) goToQuestion(idx); };
            navDiv.appendChild(btn);
        });
        let answered = userAnswers.filter(a => a && a.toString().trim() !== "").length;
        document.getElementById("answeredCounter").innerHTML = `📋 Questions answered: ${answered} / ${questionsData.length}`;
        document.getElementById("graphCounter").innerHTML = `📊 Graph/Practical questions: ${graphQuestionCount} (self-assess)`;
    }
    
    function goToQuestion(idx) { if(examSubmitted) return; document.querySelectorAll(".question-card").forEach(card => card.classList.remove("active-question")); currentQIndex = idx; const target = document.getElementById(`qcard-${idx}`); if(target) target.classList.add("active-question"); renderNavigation(); }
    function saveAnswer(idx, value) { if(examSubmitted) return; userAnswers[idx] = value; renderNavigation(); autoSaveToLocal(); }
    function setManualMark(idx, markValue) { if(examSubmitted) return; let num = parseInt(markValue) || 0; let maxMarks = questionsData[idx].marks; num = Math.min(Math.max(num,0), maxMarks); userManualMarks[idx] = num; autoSaveToLocal(); }
    function toggleMarkScheme(idx) { 
        if(!questionsData[idx].isGraphical) return;
        let panel = document.getElementById(`ms-panel-${idx}`); 
        if(panel) panel.classList.toggle("visible"); 
    }
    
    function buildQuestionsHTML() {
        const container = document.getElementById("questionsContainer");
        container.innerHTML = "";
        questionsData.forEach((q, idx) => {
            const card = document.createElement("div");
            card.className = "question-card";
            if(idx === 0) card.classList.add("active-question");
            card.id = `qcard-${idx}`;
            let inner = `<div class="q-title">Q${idx+1} (${q.topic}) <span class="marks">${q.marks} marks</span>`;
            
            if(q.isGraphical) {
                inner += `<span class="graph-badge">📊 Graph/Diagram Question - Self-Assess</span>`;
            }
            inner += `</div><div>${q.text}</div>`;
            
            // Answer input based on type
            if(q.type === "mcq") {
                inner += `<div class="subquestion">`;
                (q.options || []).forEach(opt => {
                    let checked = (userAnswers[idx] === opt) ? "checked" : "";
                    inner += `<label class="mcq-option"><input type="radio" name="q${idx}" value="${opt}" ${checked} onchange="saveAnswer(${idx}, this.value)"> ${opt}</label><br>`;
                });
                inner += `</div>`;
            } else if(q.type === "calc") {
                let val = userAnswers[idx] || "";
                inner += `<div class="subquestion"><input type="text" placeholder="Numeric answer..." value="${val.replace(/"/g, '&quot;')}" onchange="saveAnswer(${idx}, this.value)"></div>`;
            } else {
                let val = userAnswers[idx] || "";
                inner += `<div class="subquestion"><textarea rows="3" placeholder="Write your answer..." onchange="saveAnswer(${idx}, this.value)">${val}</textarea></div>`;
            }
            
            // AUTO-DETECTED: For graph questions, show Mark Scheme button + self-assess marks
            if(q.isGraphical === true) {
                inner += `<div style="margin-top:12px;">
                            <button type="button" class="small" onclick="toggleMarkScheme(${idx})">📖 Show Mark Scheme (for self-assessment)</button>
                            <div id="ms-panel-${idx}" class="ms-panel"><strong>📌 Mark Scheme:</strong><br>${q.msText || 'No mark scheme provided'}</div>
                            <div class="marks-earned-row"><span>✍️ Self-assess marks earned (0-${q.marks}): </span>
                            <select onchange="setManualMark(${idx}, this.value)"><option value="">-- select --</option>`;
                for(let m=0; m<=q.marks; m++) {
                    let sel = (userManualMarks[idx] === m) ? "selected" : "";
                    inner += `<option value="${m}" ${sel}>${m} / ${q.marks}</option>`;
                }
                inner += `</select></div></div>`;
            }
            
            // Show placeholder for graph/drawing questions
            if(q.isGraphical || q.text.toLowerCase().includes('graph') || q.text.toLowerCase().includes('plot') || q.text.toLowerCase().includes('draw')) {
                inner += `<div class="placeholder-img">📊 [Graph/Diagram placeholder - please plot/draw on paper or upload your drawing]</div>`;
            }
            
            card.innerHTML = inner;
            container.appendChild(card);
        });
    }
    
    // AI Marking function (same as original)
    async function callOpenAIForMark(question, studentAnswer, markScheme, maxMarks) {
        if(!OPENAI_API_KEY || OPENAI_API_KEY === "YOUR_OPENAI_API_KEY") {
            if(!studentAnswer) return { score: 0, feedback: "No answer provided" };
            let keywords = question.correctKeywords || [];
            if(keywords.length === 0) return { score: 0, feedback: "No keywords defined for marking" };
            let ansLower = studentAnswer.toLowerCase();
            let matched = keywords.filter(kw => ansLower.includes(kw.toLowerCase())).length;
            let required = question.requiredKeywords || keywords.length;
            let score = Math.min(matched, required, maxMarks);
            let feedback = `Matched ${matched}/${required} key terms. Expected: ${keywords.join(", ")}`;
            return { score: score, feedback: feedback };
        }
        
        const prompt = `You are an Edexcel IGCSE Biology examiner. Award marks strictly based on the mark scheme and provide constructive feedback.
    Question: "${question.text}"
    Mark Scheme: "${markScheme}"
    Maximum marks: ${maxMarks}
    Student Answer: "${studentAnswer || '[no answer]'}"
    Return ONLY a JSON object: {"score": number (0-${maxMarks}), "feedback": "brief constructive feedback explaining what was good/missing"}. Do not include any other text.`;
        
        try {
            const response = await fetch("https://api.openai.com/v1/chat/completions", {
                method: "POST",
                headers: { "Content-Type": "application/json", "Authorization": `Bearer ${OPENAI_API_KEY}` },
                body: JSON.stringify({ model: OPENAI_MODEL, messages: [{ role: "user", content: prompt }], temperature: 0.1 })
            });
            if(!response.ok) throw new Error(`API error ${response.status}`);
            const data = await response.json();
            const result = JSON.parse(data.choices[0].message.content);
            return {
                score: Math.min(Math.max(0, parseInt(result.score) || 0), maxMarks),
                feedback: result.feedback || "AI assessment complete."
            };
        } catch(e) { 
            console.error("OpenAI error:", e); 
            return { score: 0, feedback: "AI marking error - please review manually" };
        }
    }
    
    async function submitAndMarkExam() {
        if(examSubmitted) return;
        clearInterval(timerInterval);
        if(autoSaveTimer) clearInterval(autoSaveTimer);        
        examSubmitted = true;
        
        showToast("🤖 AI is marking non-graphical questions...", false);
        const loadingDiv = document.createElement("div");
        loadingDiv.className = "loading-overlay";
        loadingDiv.innerHTML = `<div class="loading-spinner"><div class="spinner"></div><p>Marking in progress...</div>`;
        document.body.appendChild(loadingDiv);
        
        let totalEarned = 0, totalPossible = 0;
        let questionFeedback = [];
        
        for(let i=0; i<questionsData.length; i++) {
            let q = questionsData[i];
            let answer = userAnswers[i] || "";
            let earned = 0;
            let aiFeedback = "";
            
            if(q.isGraphical === true) {
                earned = (userManualMarks[i] !== null && !isNaN(userManualMarks[i])) ? userManualMarks[i] : 0;
                earned = Math.min(Math.max(0, earned), q.marks);
                aiFeedback = "Self-assessed by student (graph/diagram question - compared with mark scheme)";
            } else if(q.type === "mcq") {
                earned = (answer && answer.trim().toLowerCase() === (q.correct || "").toLowerCase()) ? q.marks : 0;
                aiFeedback = earned === q.marks ? "Correct answer selected" : "Incorrect answer - correct option: " + q.correct;
            } else if(q.type === "calc") {
                let num = parseFloat(answer);
                if(!isNaN(num) && Math.abs(num - q.correctValue) <= (q.tolerance || 0.01)) {
                    earned = q.marks;
                    aiFeedback = `Correct calculation (expected: ${q.correctValue})`;
                } else {
                    earned = 0;
                    aiFeedback = `Incorrect calculation. Expected: ${q.correctValue}, Got: ${answer || "no answer"}`;
                }
            } else {
                const aiResult = await callOpenAIForMark(q, answer, q.msText, q.marks);
                earned = aiResult.score;
                aiFeedback = aiResult.feedback;
            }
            
            totalEarned += earned;
            totalPossible += q.marks;
            let status = earned === q.marks ? "✓ Full marks" : (earned === 0 ? "✗ No marks" : "⚠ Partial marks");
            
            questionFeedback.push({
                number: i+1, topic: q.topic, question: q.text,
                studentAnswer: answer || "(blank)", marksEarned: earned,
                marksTotal: q.marks, status: status, expectedAnswer: q.msText, 
                aiFeedback: aiFeedback,
                isGraphical: q.isGraphical
            });
        }
        
        let percent = (totalEarned / totalPossible) * 100;
        let grade = percent >=85 ? "9" : percent>=78 ? "8" : percent>=70 ? "7" : percent>=62 ? "6" : percent>=54 ? "5" : percent>=45 ? "4" : percent>=35 ? "3" : percent>=25 ? "2" : "1";
        let weakTopics = [];
        let topicAgg = {};
        questionFeedback.forEach(fb => { if(!topicAgg[fb.topic]) topicAgg[fb.topic]={earned:0,total:0}; topicAgg[fb.topic].earned+=fb.marksEarned; topicAgg[fb.topic].total+=fb.marksTotal; });
        for(let t in topicAgg) if((topicAgg[t].earned/topicAgg[t].total)*100 < 55) weakTopics.push(t);
        
        const reviewDiv = document.getElementById("reviewPanel");
        reviewDiv.classList.remove("hidden");
        let html = `<h2>📊 Exam Results</h2><div class="score-badge">${totalEarned} / ${totalPossible} (${percent.toFixed(1)}%)</div>
                    <div class="grade-box"><strong>Edexcel Grade: ${grade}</strong></div>
                    <div class="grade-box" style="background:#e9f0f5;"><strong>📊 Graph Questions:</strong> ${graphQuestionCount} question(s) were self-assessed using mark scheme</div>`;
        if(weakTopics.length) html += `<div class="weakness-box"><h3>⚠️ Weak areas (&lt;55%)</h3><ul>${weakTopics.map(w=>`<li>${w}</li>`).join('')}</ul></div>`;
        else html += `<div class="weakness-box" style="background:#e0f2e9;"><h3>✅ Strong performance overall!</h3></div>`;
        
        html += `<details open><summary>📋 Detailed Feedback</summary><table class="feedback-table"><thead>`;
        html += `<tr><th>#</th><th>Topic</th><th>Question</th><th>Your Answer</th><th>Score</th><th>Feedback</th><th>Mark Scheme</th></tr>`;
        html += `</thead><tbody>`;
        
        for(let fb of questionFeedback) {
            let cls = fb.marksEarned === fb.marksTotal ? "correct-highlight" : (fb.marksEarned===0 ? "incorrect-highlight" : "");
            html += `<tr class="${cls}">`;
            html += `<td>${fb.number}${fb.isGraphical ? ' 📊' : ''}</td>`;
            html += `<td>${fb.topic}</td>`;
            html += `<td>${fb.question}</td>`;
            html += `<td style="max-width:250px;">${fb.studentAnswer}</td>`;
            html += `<td style="text-align:center;">${fb.marksEarned}/${fb.marksTotal}<br>${fb.status}</td>`;
            html += `<td style="max-width:300px;">${fb.aiFeedback || "No feedback available"}</td>`;    
            html += `<td style="max-width:250px;">${fb.expectedAnswer || "N/A"}</td>`;
            html += `</tr>`;
        }
        
        html += `</tbody></table></details>`;
        html += `<p style="margin-top: 20px; padding: 12px; background: #f0f6fa; border-radius: 16px;">✅ <strong>How marking worked:</strong> Questions automatically detected as "graph/drawing/plot" questions (${graphQuestionCount} total) required self-assessment using the mark scheme. All other questions were marked automatically.</p>`;
        
        reviewDiv.innerHTML = html;
        document.body.removeChild(loadingDiv);
        document.querySelectorAll("input, textarea, button, select").forEach(el => { if(el.id !== "submitBtn") el.disabled = true; });
        document.getElementById("submitBtn").disabled = true;
        showToast("Marking complete!", false);
        localStorage.removeItem("igcse_bio_exam_autosave");
        
        try {
            const emailResultData = {
                score: totalEarned,
                totalMarks: totalPossible,
                percent: percent,
                grade: grade,
                weakTopics: weakTopics,
                details: questionFeedback.map(fb => ({
                    qNum: fb.number,
                    earned: fb.marksEarned,
                    max: fb.marksTotal
                }))
            };
            await sendResultsEmail(emailResultData, "Exam Candidate");
        } catch(emailError) {
            console.error("Failed to send email:", emailError);
        }
    }
    
    // Expose functions globally
    window.saveAnswer = saveAnswer;
    window.setManualMark = setManualMark;
    window.toggleMarkScheme = toggleMarkScheme;
    window.goToQuestion = goToQuestion;
    
    window.onload = () => {
        loadAutoSave();
        buildQuestionsHTML();
        renderNavigation();
        startTimer();
        autoSaveTimer = setInterval(() => { if(!examSubmitted) autoSaveToLocal(); }, 30000);
        document.getElementById("nextBtn").onclick = () => { if(currentQIndex+1 < questionsData.length && !examSubmitted) goToQuestion(currentQIndex+1); };
        document.getElementById("prevBtn").onclick = () => { if(currentQIndex-1 >=0 && !examSubmitted) goToQuestion(currentQIndex-1); };
        document.getElementById("submitBtn").onclick = () => { if(confirm("Submit exam? Graph questions require self-assessment; other questions will be AI-marked.")) submitAndMarkExam(); };
    };
</script>
