    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 20px;
            color: #1e2a3e;
        }
        .exam-container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 28px;
            box-shadow: 0 12px 30px rgba(0,0,0,0.1);
            overflow: hidden;
            padding: 20px 30px 40px;
        }
        .header {
            border-bottom: 3px solid #2c7da0;
            padding-bottom: 15px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
        }
        .title h1 { margin: 0; font-size: 1.7rem; color: #0b3b4f; }
        .title p { margin: 5px 0 0; color: #2c7da0; font-weight: 500; }
        .timer-area { background: #1e2a3e; padding: 8px 18px; border-radius: 60px; color: white; text-align: center; font-weight: bold; }
        .timer { font-size: 2rem; font-family: monospace; letter-spacing: 2px; }
        .info-bar {
            background: #e9f0f5;
            padding: 10px 20px;
            border-radius: 28px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
        }
        .question-nav {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 25px;
            border-bottom: 1px solid #cbd5e1;
            padding-bottom: 15px;
            max-height: 150px;
            overflow-y: auto;
        }
        .nav-btn {
            background: #eef2f6;
            border: none;
            width: 42px;
            height: 42px;
            border-radius: 42px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.1s;
            font-size: 0.9rem;
        }
        .nav-btn.active { background: #2c7da0; color: white; }
        .nav-btn.answered { background: #61a5c2; color: white; }
        .question-card {
            display: none;
            background: #ffffff;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 30px;
            border: 1px solid #e2e8f0;
        }
        .question-card.active-question { display: block; }
        .q-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 15px;
            background: #f0f6fa;
            padding: 6px 12px;
            border-radius: 30px;
            display: inline-block;
        }
        .marks { font-size: 0.8rem; background: #cbd5e1; border-radius: 20px; padding: 2px 10px; margin-left: 12px; }
        .subquestion { margin: 20px 0 20px 12px; border-left: 3px solid #cbd5e1; padding-left: 18px; }
        .placeholder-img {
            background: #eef2f9;
            border: 1px dashed #8ba0bc;
            padding: 20px;
            text-align: center;
            border-radius: 16px;
            margin: 15px 0;
            font-style: italic;
            color: #2c3e66;
        }
        .mcq-option { margin: 10px 0; }
        input[type="text"], input[type="number"], textarea {
            padding: 10px 14px;
            border-radius: 14px;
            border: 1px solid #b9c7d9;
            width: 100%;
            max-width: 550px;
            font-family: inherit;
        }
        textarea { max-width: 100%; }
        .action-buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 30px;
            gap: 12px;
            flex-wrap: wrap;
        }
        button { background: #2c7da0; border: none; padding: 10px 26px; border-radius: 40px; color: white; font-weight: bold; cursor: pointer; font-size: 0.9rem; }
        button.secondary { background: #6c757d; }
        button.warning { background: #b23c1c; }
        button:disabled { opacity: 0.6; cursor: not-allowed; }
        .review-section { background: #fef9e3; padding: 20px; border-radius: 20px; margin-top: 30px; }
        .hidden { display: none; }
        .score-badge { font-size: 2rem; font-weight: bold; color: #1e2a3e; }
        .grade-box { background: #d9e6f2; padding: 12px; border-radius: 24px; margin: 15px 0; }
        .weakness-box { background: #ffe6e6; padding: 16px; border-radius: 20px; margin-top: 20px; border-left: 8px solid #c7362b; }
        .feedback-table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        .feedback-table th, .feedback-table td { border: 1px solid #ddd; padding: 10px; vertical-align: top; text-align: left; }
        .feedback-table th { background: #2c7da0; color: white; }
        .feedback-table tr:nth-child(even) { background: #f9f9f9; }
        .correct-highlight { background: #d4edda; }
        .incorrect-highlight { background: #f8d7da; }
        details summary { cursor: pointer; font-weight: 600; margin: 15px 0; }
        footer { text-align: center; font-size: 0.8rem; margin-top: 30px; color: #6c757d; }
        .status-toast {
            position: fixed; bottom: 20px; right: 20px;
            background: #2c7da0; color: white; padding: 8px 16px;
            border-radius: 30px; font-size: 0.8rem; opacity: 0;
            transition: opacity 0.3s; pointer-events: none; z-index: 1000;
        }
        .loading-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            backdrop-filter: blur(3px);
        }
        .loading-spinner {
            background: white;
            padding: 30px 40px;
            border-radius: 30px;
            text-align: center;
            font-weight: bold;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }
        .spinner {
            border: 4px solid #e9f0f5;
            border-top: 4px solid #2c7da0;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @media (max-width: 700px) { .exam-container { padding: 15px; } .timer { font-size: 1.4rem; } .feedback-table { font-size: 0.8rem; } }
        .ai-badge { background: #4a6fa5; color: white; font-size: 0.7rem; border-radius: 20px; padding: 2px 10px; margin-left: 10px; vertical-align: middle; }
        .ms-badge { background: #f4a261; color: white; font-size: 0.7rem; border-radius: 20px; padding: 2px 10px; margin-left: 10px; vertical-align: middle; }
        .ms-panel { background: #f8f9fc; border-left: 5px solid #f4a261; padding: 12px 16px; margin-top: 15px; border-radius: 16px; font-size: 0.9rem; display: none; }
        .ms-panel.visible { display: block; }
        .marks-earned-row {
            margin-top: 12px;
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        .marks-earned-row select {
            padding: 6px 12px;
            border-radius: 30px;
            background: white;
            border: 1px solid #b9c7d9;
            font-weight: bold;
        }
        button.small {
            background: #e76f51;
            padding: 5px 12px;
            font-size: 0.7rem;
            border: none;
            border-radius: 30px;
            color: white;
            cursor: pointer;
        }
        .graph-badge {
            background: #f4a261;
            color: white;
            font-size: 0.7rem;
            border-radius: 20px;
            padding: 2px 10px;
            margin-left: 10px;
            vertical-align: middle;
        }
    </style>

<body>
<div class="exam-container" id="examApp">
    <div class="header">
        <div class="title">
            <h1>Edexcel IGCSE Biology (4BI1)</h1>
            <p>Biology Paper 1B | June 2022</p>
        </div>
        <div class="timer-area">
            <div>Time Remaining</div>
            <div class="timer" id="timerDisplay">02:00:00</div>
        </div>
    </div>
    <div class="info-bar">
        <span>⏱️ 2 hours | 📝 Total marks: 110</span>
        <span id="answeredCounter">📋 Questions answered: 0 / 55</span>

<script>
    
    const EXAM_TITLE = "Edexcel IGCSE Biology (4BI1) - June 2022 Paper 1B";

    // ========== OPENAI CONFIGURATION ==========
    const OPENAI_API_KEY="OPENAI_API_KEY_PLACEHOLDER";  // <-- PASTE YOUR OPENAI API KEY HERE
    const OPENAI_MODEL = "gpt-3.5-turbo";
    const EMAILJS_PUBLIC_KEY = "PmVcThAzwAjgqOwSD";     // Replace with your EmailJS public key
    const EMAILJS_SERVICE_ID = "service_301bogs";   // Replace with your service ID
    const EMAILJS_TEMPLATE_ID = "template_mld7q9t"; // Replace with your template ID
    const RECIPIENT_EMAIL = "aisha.daray@gmail.com";
    
    if(EMAILJS_PUBLIC_KEY && EMAILJS_PUBLIC_KEY !== "YOUR_PUBLIC_KEY") {
        try {
            emailjs.init(EMAILJS_PUBLIC_KEY);
        } catch(e) {
            console.log("EmailJS init error:", e);
        }
    }
    
    // ========== AUTO DETECTION FUNCTION FOR GRAPH QUESTIONS ==========
    // This function automatically detects if a question requires graph/drawing/plotting
 // MODIFIED: Only detects when type is 'graph' OR 'practical'
    function isGraphOrPracticalQuestion(question) {
        // Only return true if type is exactly 'graph' OR 'practical'
        return question.type === 'graph' || question.type === 'practical';
    }
    
    // ========== IndexedDB Setup ==========
    const DB_NAME = "IGCSE_Biology_Exam_DB";
    const DB_VERSION = 2;
    const PROGRESS_STORE = "exam_progress";
    const RESULTS_STORE = "exam_results";
    let db = null;
    
    function initDatabase() {
        return new Promise((resolve, reject) => {
            const request = indexedDB.open(DB_NAME, DB_VERSION);
            request.onerror = () => reject(request.error);
            request.onsuccess = () => {
                db = request.result;
                resolve(db);
            };
            request.onupgradeneeded = (event) => {
                const dbEvent = event.target.result;
                if (!dbEvent.objectStoreNames.contains(PROGRESS_STORE)) {
                    dbEvent.createObjectStore(PROGRESS_STORE, { keyPath: "id" });
                }
                if (!dbEvent.objectStoreNames.contains(RESULTS_STORE)) {
                    dbEvent.createObjectStore(RESULTS_STORE, { keyPath: "id", autoIncrement: true });
                }
            };
        });
    }
    
    async function saveProgressToDB(answers, manualMarks, timeLeft) {
        if (!db) await initDatabase();
        return new Promise((resolve, reject) => {
            const transaction = db.transaction([PROGRESS_STORE], "readwrite");
            const store = transaction.objectStore(PROGRESS_STORE);
            const record = {
                id: "current_progress",
                answers: answers,
                manualMarks: manualMarks,
                timeRemaining: timeLeft,
                timestamp: new Date().toISOString()
            };
            const request = store.put(record);
            request.onsuccess = () => resolve();
            request.onerror = () => reject(request.error);
        });
    }
    
    async function loadProgressFromDB() {
        if (!db) await initDatabase();
        return new Promise((resolve, reject) => {
            const transaction = db.transaction([PROGRESS_STORE], "readonly");
            const store = transaction.objectStore(PROGRESS_STORE);
            const request = store.get("current_progress");
            request.onsuccess = () => resolve(request.result);
            request.onerror = () => reject(request.error);
        });
    }
    
    async function saveResultToDB(resultData) {
        if (!db) await initDatabase();
        return new Promise((resolve, reject) => {
            const transaction = db.transaction([RESULTS_STORE], "readwrite");
            const store = transaction.objectStore(RESULTS_STORE);
            const record = {
                timestamp: new Date().toISOString(),
                ...resultData
            };
            const request = store.add(record);
            request.onsuccess = () => resolve(request.result);
            request.onerror = () => reject(request.error);
        });
    }
    
    async function clearProgressFromDB() {
        if (!db) await initDatabase();
        return new Promise((resolve, reject) => {
            const transaction = db.transaction([PROGRESS_STORE], "readwrite");
            const store = transaction.objectStore(PROGRESS_STORE);
            const request = store.delete("current_progress");
            request.onsuccess = () => resolve();
            request.onerror = () => reject(request.error);
        });
    }
    
    function showToast(message, isError = false) {
        const toast = document.getElementById("statusToast");
        if (!toast) return;
        toast.textContent = message;
        toast.style.background = isError ? "#b23c1c" : "#2c7da0";
        toast.style.opacity = "1";
        setTimeout(() => { toast.style.opacity = "0"; }, 3000);
    }
    
    async function sendResultsEmail(resultData, studentName = "Student") {
        if (EMAILJS_PUBLIC_KEY === "YOUR_PUBLIC_KEY") {
            console.log("EmailJS not configured. Results:", resultData);
            showToast("Email not sent - configure EmailJS keys", false);
            return false;
        }
        try {
            const emailParams = {
                EXAM_TITLE: EXAM_TITLE,
                to_email: RECIPIENT_EMAIL,
                student_name: studentName,
                score: resultData.score,
                total_marks: resultData.totalMarks,
                percentage: resultData.percent.toFixed(1),
                grade: resultData.grade,
                weak_topics: resultData.weakTopics.join(", ") || "None",
                exam_date: new Date().toLocaleString(),
                details_summary: resultData.details.map(d => `Q${d.qNum}: ${d.earned}/${d.max}`).join("; ")
            };
            await emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, emailParams);
            showToast("✅ Results emailed successfully!", false);
            return true;
        } catch(e) {
            console.error("Email error:", e);
            showToast("⚠️ Email failed - check EmailJS configuration", true);
            return false;
        }
    }
    
    // ========== Question Bank (without isGraphical flag - will be auto-detected) ==========
    const questionsDataRaw = [
        { id:"q1ai", type:"mcq", text:"1(a)(i) Which gland produces insulin?", options:["A (pancreas)","B","C","D"], correct:"A", marks:1, topic:"Hormones/Endocrine system", msText:"A" },
        { id:"q1aii", type:"mcq", text:"1(a)(ii) Which gland produces progesterone?", options:["A","B","C","D (ovary)"], correct:"D", marks:1, topic:"Hormones/Reproduction", msText:"D" },
        { id:"q1bi", type:"calc", text:"1(b)(i) Determine the ratio of nervous speed (55 m/s) to hormonal speed (420 cm/min).", correctValue:786, tolerance:5, marks:3, topic:"Maths/Ratio", msText:"convert hormonal speed to m/min = 4.2 m/min; convert to m/s = 0.07 m/s; 55 ÷ 0.07 = 786 : 1 (3)" },
        { id:"q1bii", type:"written", text:"1(b)(ii) Describe three other differences between the nervous system and the hormonal system.", correctKeywords:["uses neurones / nerve cells","electrical","goes to target cells only / specific","(response) is usually short (term)"], marks:3, requiredKeywords:3, topic:"Coordination", msText:"uses neurones / nerve cells (1); electrical (1); goes to target cells only / specific (locus) (1); (response) is usually short (term) (1)" },
        { id:"q2a", type:"written", text:"2(a) Complete the passage about fungi (mycelium, hyphae, chitin, enzymes, saprotrophic).", correctKeywords:["hyphae","chitin","enzymes","saprotrophic / saprophytic"], marks:4, requiredKeywords:4, topic:"Classification/Fungi", msText:"hyphae (1); chitin (1); enzymes (1); saprotrophic / saprophytic (1)" },
        { id:"q2bi", type:"written", text:"2(b)(i) Name the gas produced by yeast during anaerobic respiration.", correctKeywords:["carbon dioxide / CO2"], marks:1, topic:"Respiration", msText:"carbon dioxide / CO2" },
        { id:"q2bii", type:"written", text:"2(b)(ii) Explain the effect of increasing temperature on the rate of gas production by yeast.", correctKeywords:["increasing (kinetic) energy / molecules move more","more collisions / more enzyme substrate complexes","above 37/40°C / eventual denaturation / change in active site"], marks:3, requiredKeywords:3, topic:"Enzymes/Respiration", msText:"increasing (kinetic) energy / molecules move more (1); more collisions/ more enzyme substrate complexes formed (1); above 37 / 40°C / optimum / eventually / at higher temperature enzyme denatures / change in active site / substrate and enzyme can no longer bind (1)" },
        { id:"q2biii", type:"written", text:"2(b)(iii) Describe how the student could measure the rate of gas production in this experiment.", correctKeywords:["use (collect gas in) measuring cylinder / (gas) syringe","measure volume (cm³) in time / time to produce volume"], marks:2, requiredKeywords:2, topic:"Practical/Respiration", msText:"use (collect gas in) measuring cylinder / (gas) syringe (1); measure volume / cm³ in time / or time to produce volume (1)" },
        { id:"q3ai", type:"written", text:"3(a)(i) State what is meant by the term median.", correctKeywords:["the middle value"], marks:1, topic:"Maths/Statistics", msText:"the middle value" },
        { id:"q3aii", type:"written", text:"3(a)(ii) Give a reason why the median is used rather than the mean.", correctKeywords:["each age has wide / high range","not (influenced) by / reduces effect of extreme values / anomalies","data is skewed"], marks:1, topic:"Maths/Statistics", msText:"median used as each age has wide / high range / not (influenced by) affected by / reduces effect of extreme values / data is skewed / less affected by anomalies (1)" },
        { id:"q3aiii", type:"written", text:"3(a)(iii) Describe the relationship between vital capacity and age shown by the graph.", correctKeywords:["increases (steeply) up to 20-25 years","levels off / peaks 20-25 years","decreases (steadily) from 20-25 years"], marks:2, requiredKeywords:2, topic:"Respiratory system/Data analysis", msText:"increases (steeply) up to 20-25 years (1); levels off / peaks 20-25 years (1); decreases (steadily at constant rate) from 20-25 years (1)" },
        { id:"q3aiv", type:"written", text:"3(a)(iv) Explain why vital capacity changes with age.", correctKeywords:["(increases) as body / size / mass / chest cavity / lungs / muscle increases","no / little change (from 20) no further growth","(decreases) diaphragm / intercostal muscle weaker / lungs less elastic"], marks:2, requiredKeywords:2, topic:"Respiratory system", msText:"(increases) as body / size / mass / chest cavity / lungs / muscle increases / grows / develops (1); no / little change (from 20) no further growth (1); (decreases) as diaphragm / intercostal muscle weaker / lungs less elastic / less recoil (1)" },
        { id:"q3av", type:"written", text:"3(a)(v) Give two other variables that can affect a person's vital capacity.", correctKeywords:["smoking","lung disease / asthma / bronchitis / emphysema","fitness","body size/height/mass","sex","altitude","pregnancy","pollution"], marks:2, requiredKeywords:2, topic:"Respiratory system", msText:"smoking (1); lung disease / infection / condition / asthma / bronchitis / emphysema (1); fitness / how active you are (1); body size/ height / mass / genetics (1); sex (1); altitude at which you live (1); pregnancy (1); pollution (1)" },
        { id:"q3b", type:"written", text:"3(b) Describe a method you could use to demonstrate the effect of exercise on breathing rate in students.", correctKeywords:["count number of breaths per minute at rest","count number of breaths per minute after/during exercise","repeat / using more participants"], marks:3, requiredKeywords:3, topic:"Practical/Respiratory system", msText:"count number of breaths per minute / use number of breaths in stated time (at rest) (1); count number of breaths per minute after / during exercise (1); repeat / using more participants (1)" },
        { id:"q4ai", type:"graph", text:"4(a)(i) Draw a labelled pyramid of numbers for this data (producers 59282, primary 683, secondary 35, tertiary 3).", correctKeywords:["correct order of names (producer, primary, secondary, tertiary)","correct shape (wide base, narrow top)"], marks:2, topic:"Ecology/Pyramids", msText:"correct order of names (1); correct shape (1)" },

        { id:"q4bii", type:"written", text:"4(b)(ii) Comment on the energy transfers in this ecosystem.", correctKeywords:["fewer organisms at top of pyramid","less biomass at top","energy / biomass lost at each transfer","most energy lost from producer to primary consumer","movement / heat loss / respiration","not all material digested / cellulose not digested / energy lost in faeces","not all organism eaten","excretion / urine","decomposition"], marks:4, requiredKeywords:4, topic:"Ecology/Energy transfer", msText:"fewer organisms at top of pyramid (1); less biomass at top (1); energy / biomass lost at each transfer (1); most energy lost from producer to primary consumer (1); movement / heat loss / respiration (1); not all material digested / cellulose not digested / energy lost in faeces (1); not all organism eaten (1); excretion / urine (1); decomposition (1)" },

    function loadAutoSave() {
        const saved = localStorage.getItem("igcse_bio_exam_autosave");
        if(saved) {
            try {
                const data = JSON.parse(saved);
                if(data.answers && data.answers.length === userAnswers.length) {
                    userAnswers = data.answers;
                    if(data.manualMarks) userManualMarks = data.manualMarks;
                    if(data.timeRemaining && data.timeRemaining > 0 && data.timeRemaining < 7200) {
                        timeSeconds = data.timeRemaining;
                        updateTimerDisplay();
                    }
                    return true;
                }
            } catch(e) { console.log("Load error:", e); }
        }
        return false;
    }

    // AI Marking function (same as original)
    async function callOpenAIForMark(question, studentAnswer, markScheme, maxMarks) {
        if(!OPENAI_API_KEY || OPENAI_API_KEY === "YOUR_OPENAI_API_KEY") {
            if(!studentAnswer) return { score: 0, feedback: "No answer provided" };
            let keywords = question.correctKeywords || [];
            if(keywords.length === 0) return { score: 0, feedback: "No keywords defined for marking" };
            let ansLower = studentAnswer.toLowerCase();
            let matched = keywords.filter(kw => ansLower.includes(kw.toLowerCase())).length;
            let required = question.requiredKeywords || keywords.length;
            let score = Math.min(matched, required, maxMarks);
            let feedback = `Matched ${matched}/${required} key terms. Expected: ${keywords.join(", ")}`;
            return { score: score, feedback: feedback };
        }
        
        const prompt = `You are an Edexcel IGCSE Biology examiner. Award marks strictly based on the mark scheme and provide constructive feedback.
    Question: "${question.text}"
    Mark Scheme: "${markScheme}"
    Maximum marks: ${maxMarks}
    Student Answer: "${studentAnswer || '[no answer]'}"
    Return ONLY a JSON object: {"score": number (0-${maxMarks}), "feedback": "brief constructive feedback explaining what was good/missing"}. Do not include any other text.`;
        
        try {
            const response = await fetch("https://api.openai.com/v1/chat/completions", {
                method: "POST",
                headers: { "Content-Type": "application/json", "Authorization": `Bearer ${OPENAI_API_KEY}` },
                body: JSON.stringify({ model: OPENAI_MODEL, messages: [{ role: "user", content: prompt }], temperature: 0.1 })
            });
            if(!response.ok) throw new Error(`API error ${response.status}`);
            const data = await response.json();
            const result = JSON.parse(data.choices[0].message.content);
            return {
                score: Math.min(Math.max(0, parseInt(result.score) || 0), maxMarks),
                feedback: result.feedback || "AI assessment complete."
            };
        } catch(e) { 
            console.error("OpenAI error:", e); 
            return { score: 0, feedback: "AI marking error - please review manually" };
        }
    }
    
    async function submitAndMarkExam() {
        if(examSubmitted) return;
        clearInterval(timerInterval);
        if(autoSaveTimer) clearInterval(autoSaveTimer);        
        examSubmitted = true;
        
        showToast("🤖 AI is marking non-graphical questions...", false);
        const loadingDiv = document.createElement("div");
        loadingDiv.className = "loading-overlay";
        loadingDiv.innerHTML = `<div class="loading-spinner"><div class="spinner"></div><p>Marking in progress...</div>`;
        document.body.appendChild(loadingDiv);
        
        let totalEarned = 0, totalPossible = 0;
        let questionFeedback = [];
        
        for(let i=0; i<questionsData.length; i++) {
            let q = questionsData[i];
            let answer = userAnswers[i] || "";
            let earned = 0;
            let aiFeedback = "";
            
            if(q.isGraphical === true) {
                earned = (userManualMarks[i] !== null && !isNaN(userManualMarks[i])) ? userManualMarks[i] : 0;
                earned = Math.min(Math.max(0, earned), q.marks);
                aiFeedback = "Self-assessed by student (graph/diagram question - compared with mark scheme)";
            } else if(q.type === "mcq") {
                earned = (answer && answer.trim().toLowerCase() === (q.correct || "").toLowerCase()) ? q.marks : 0;
                aiFeedback = earned === q.marks ? "Correct answer selected" : "Incorrect answer - correct option: " + q.correct;
            } else if(q.type === "calc") {
                let num = parseFloat(answer);
                if(!isNaN(num) && Math.abs(num - q.correctValue) <= (q.tolerance || 0.01)) {
                    earned = q.marks;
                    aiFeedback = `Correct calculation (expected: ${q.correctValue})`;
                } else {
                    earned = 0;
                    aiFeedback = `Incorrect calculation. Expected: ${q.correctValue}, Got: ${answer || "no answer"}`;
                }
            } else {
                const aiResult = await callOpenAIForMark(q, answer, q.msText, q.marks);
                earned = aiResult.score;
                aiFeedback = aiResult.feedback;
            }
            
            totalEarned += earned;
            totalPossible += q.marks;

                    earned: fb.marksEarned,
                    max: fb.marksTotal
                }))
            };
            await sendResultsEmail(emailResultData, "Exam Candidate");
        } catch(emailError) {
            console.error("Failed to send email:", emailError);
        }
    }
    
    // Expose functions globally
    window.saveAnswer = saveAnswer;
    window.setManualMark = setManualMark;
    window.toggleMarkScheme = toggleMarkScheme;
    window.goToQuestion = goToQuestion;
    
    window.onload = () => {
        loadAutoSave();
        buildQuestionsHTML();
        renderNavigation();
        startTimer();
        autoSaveTimer = setInterval(() => { if(!examSubmitted) autoSaveToLocal(); }, 30000);
        document.getElementById("nextBtn").onclick = () => { if(currentQIndex+1 < questionsData.length && !examSubmitted) goToQuestion(currentQIndex+1); };
        document.getElementById("prevBtn").onclick = () => { if(currentQIndex-1 >=0 && !examSubmitted) goToQuestion(currentQIndex-1); };
        document.getElementById("submitBtn").onclick = () => { if(confirm("Submit exam? Graph questions require self-assessment; other questions will be AI-marked.")) submitAndMarkExam(); };
    };
</script>
</body>
</html>
